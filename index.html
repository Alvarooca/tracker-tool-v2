// Helper base para llamadas a la API REST de Supabase
async function sbRequest(method, table, body = null, query = "") {
  try {
    const resp = await fetch(`${SUPABASE_URL}/rest/v1/${table}${query}`, {
      method,
      headers: SB_HEADERS,
      body: body ? JSON.stringify(body) : undefined,
    });
    if (!resp.ok) {
      const err = await resp.text();
      console.warn(`[supabase] ${method} ${table}: ${resp.status}`, err);
      return null;
    }
    const text = await resp.text();
    return text ? JSON.parse(text) : [];
  } catch (e) {
    console.warn(`[supabase] ${method} ${table} error:`, e);
    return null;
  }
}

async function sbUpsertHistory(entries) {
  if (!entries.length) return;
  const rows = entries.map((e) => ({
    id: e.id, user_id: SB_USER, date: e.date,
    rows: e.rows, price_total: e.priceTotal, fx_pct: e.fxPct,
    fx_gain: e.fxGain, total: e.total,
  }));
  await sbRequest("POST", "history", rows, "?on_conflict=id");
}

async function sbUpsertTransactions(txs) {
  if (!txs.length) return;
  const rows = txs.map((t) => ({
    id: t.id, user_id: SB_USER, ticker: t.ticker, date: t.date,
    type: t.type, qty: t.qty, price: t.price, fx: t.fx ?? null, source: t.source ?? null,
  }));
  await sbRequest("POST", "transactions", rows, "?on_conflict=id");
}

async function sbUpsertPortfolio(portfolio) {
  if (!portfolio.length) return;
  const rows = portfolio.map((p, i) => ({
    id: p.id, user_id: SB_USER, ticker: p.ticker, broker: p.broker ?? "",
    quantity: p.quantity, avg_cost: p.avgCost ?? null, avg_cost_brl: p.avgCostBrl ?? null,
    saldo: p.saldo, sort_order: i,
  }));
  await sbRequest("POST", "portfolio", rows, "?on_conflict=id");
  // NOTA: no eliminamos filas de la nube desde el pull — solo desde el push explícito.
  // Si lo hiciéramos aquí, un dispositivo recién sincronizado (con portfolio parcial)
  // podría borrar filas válidas de la nube que todavía no descargó.
}

async function sbUpsertSplits(splits) {
  if (!splits.length) return;
  // Deduplicar por contenido (ticker+date+ratio) antes de subir — evita que dos dispositivos
  // que crearon el mismo split con UIDs distintos terminen con duplicados en la nube.
  const seen = new Set();
  const deduped = splits.filter((s) => {
    const key = `${s.ticker}|${String(s.date).slice(0, 10)}|${s.ratio}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });
  const rows = deduped.map((s) => ({
    id: s.id, user_id: SB_USER, ticker: s.ticker, date: s.date, ratio: s.ratio,
  }));
  await sbRequest("POST", "splits", rows, "?on_conflict=id");

  // Limpiar duplicados que ya existan en la nube (por si quedaron de versiones anteriores).
  // Descargamos todos los splits de la nube, detectamos duplicados por contenido, y borramos
  // los extras manteniendo solo el más antiguo (el primero que se creó).
  const cloudAll = await sbRequest("GET", "splits", null, `?user_id=eq.${SB_USER}&select=*`);
  if (cloudAll?.length > 1) {
    const cloudSeen = new Set();
    const toDelete = [];
    cloudAll
      .sort((a, b) => new Date(a.created_at || 0) - new Date(b.created_at || 0)) // más antiguo primero
      .forEach((r) => {
        const key = `${r.ticker}|${String(r.date).slice(0, 10)}|${r.ratio}`;
        if (cloudSeen.has(key)) toDelete.push(r.id);
        else cloudSeen.add(key);
      });
    if (toDelete.length) {
      await sbRequest("DELETE", "splits", null, `?id=in.(${toDelete.join(",")})`);
      console.log(`[supabase] Eliminados ${toDelete.length} split(s) duplicado(s) de la nube`);
    }
  }
}

// ── PULL — descarga datos de la nube al abrir la app ────────────────────────

async function syncPullFromCloud() {
  try {
    const [cloudHistory, cloudTxs, cloudPortfolio, cloudSplits, cloudSettings] = await Promise.all([
      sbRequest("GET", "history", null, `?user_id=eq.${SB_USER}&select=*&order=date.asc`),
      sbRequest("GET", "transactions", null, `?user_id=eq.${SB_USER}&select=*&order=date.asc`),
      sbRequest("GET", "portfolio", null, `?user_id=eq.${SB_USER}&select=*&order=sort_order.asc`),
      sbRequest("GET", "splits", null, `?user_id=eq.${SB_USER}&select=*`),
      sbRequest("GET", "settings", null, `?user_id=eq.${SB_USER}&select=*`),
    ]);

    let changed = false;

    // Historial — agregar entradas que faltan localmente
    if (cloudHistory?.length) {
      const localIds = new Set(state.history.map((e) => e.id));
      const newEntries = cloudHistory
        .filter((r) => !localIds.has(r.id))
        .map((r) => ({ id: r.id, date: r.date, rows: r.rows, priceTotal: r.price_total, fxPct: r.fx_pct, fxGain: r.fx_gain, total: r.total }));
      if (newEntries.length) { state.history = [...state.history, ...newEntries].sort((a, b) => new Date(a.date) - new Date(b.date)); changed = true; }
    }

    // Transacciones — agregar las que faltan localmente
    if (cloudTxs?.length) {
      const localIds = new Set(state.transactions.map((t) => t.id));
      const newTxs = cloudTxs
        .filter((r) => !localIds.has(r.id))
        .map((r) => ({ id: r.id, ticker: r.ticker, date: r.date, type: r.type, qty: Number(r.qty), price: Number(r.price), fx: r.fx ? Number(r.fx) : null, source: r.source }));
      if (newTxs.length) { state.transactions = [...state.transactions, ...newTxs]; changed = true; }
    }

    // Portfolio — la nube es siempre fuente de verdad.
    // Reemplazamos el portfolio local completo con el de la nube, preservando
    // el campo `price` (cotización en vivo) si ya lo teníamos localmente.
    if (cloudPortfolio?.length) {
      const localPriceById = Object.fromEntries(state.portfolio.map((p) => [p.id, p.price ?? ""]));
      const cloudMapped = cloudPortfolio.map((r) => ({
        id: r.id, ticker: r.ticker, broker: r.broker ?? "",
        quantity: Number(r.quantity),
        avgCost: r.avg_cost ? Number(r.avg_cost) : null,
        avgCostBrl: r.avg_cost_brl ? Number(r.avg_cost_brl) : null,
        saldo: Number(r.saldo),
        price: localPriceById[r.id] ?? "",
      }));
      // Solo marcamos como changed si algo realmente difiere (evita re-renders innecesarios)
      const differs = cloudMapped.some((cp) => {
        const lp = state.portfolio.find((p) => p.id === cp.id);
        return !lp || lp.quantity !== cp.quantity || lp.avgCost !== cp.avgCost || lp.avgCostBrl !== cp.avgCostBrl;
      }) || cloudMapped.length !== state.portfolio.length;
      if (differs) { state.portfolio = cloudMapped; changed = true; }
    }

    // Splits — deduplicar por contenido (ticker+date+ratio) además de por ID.
    // Si el mismo split fue creado en dos dispositivos con UIDs distintos, ambos llegarían
    // a la nube. Al hacer pull, filtramos por contenido para no agregar duplicados localmente.
    if (cloudSplits?.length) {
      const splitKey = (s) => `${s.ticker}|${String(s.date).slice(0, 10)}|${Number(s.ratio)}`;
      const existingSplits = state.splits || [];
      const localKeys = new Set(existingSplits.map(splitKey));
      const localIds = new Set(existingSplits.map((s) => s.id));
      const newSplits = cloudSplits
        .filter((r) => !localIds.has(r.id) && !localKeys.has(splitKey({ ticker: r.ticker, date: r.date, ratio: Number(r.ratio) })))
        .map((r) => ({ id: r.id, ticker: r.ticker, date: r.date, ratio: Number(r.ratio) }));
      if (newSplits.length) { state.splits = [...existingSplits, ...newSplits]; changed = true; }

      // También deduplicar el estado local por si ya había duplicados de antes del fix
      const seenKeys = new Set();
      const dedupedLocal = (state.splits || []).filter((s) => {
        const k = splitKey(s);
        if (seenKeys.has(k)) return false;
        seenKeys.add(k);
        return true;
      });
      if (dedupedLocal.length !== (state.splits || []).length) {
        state.splits = dedupedLocal;
        changed = true;
      }
    }

    // Settings — claves API y configuración (la nube gana si hay un valor y local está vacío)
    if (cloudSettings?.length) {
      const settingsMap = Object.fromEntries(cloudSettings.map((s) => [s.key, s.value]));
      let settingsChanged = false;
      try {
        if (settingsMap["finnhub-key"] && !localStorage.getItem("pnl-finnhub-key")) {
          localStorage.setItem("pnl-finnhub-key", settingsMap["finnhub-key"]); settingsChanged = true;
        }
        if (settingsMap["twelvedata-key"] && !localStorage.getItem("pnl-twelvedata-key")) {
          localStorage.setItem("pnl-twelvedata-key", settingsMap["twelvedata-key"]); settingsChanged = true;
        }
        if (settingsMap["fx"] && !localStorage.getItem("pnl-fx")) {
          localStorage.setItem("pnl-fx", settingsMap["fx"]); settingsChanged = true;
        }
        if (settingsMap["dividend-tax"] && !localStorage.getItem("pnl-dividend-tax")) {
          localStorage.setItem("pnl-dividend-tax", settingsMap["dividend-tax"]); settingsChanged = true;
        }
      } catch (_) {}
      if (settingsChanged) changed = true;
    }

    if (changed) {
      persistHistory();
      persistTransactions();
      persistPortfolio(true); // skipCloud=true: ya vino de la nube, no re-subir
      persistSplits();
      resetHojeState();
      resetPosicoesState();
      resetHistoricoState();
      render();
      console.log("[supabase] Sincronización completada — datos actualizados desde la nube");
    }
  } catch (e) {
    console.warn("[supabase] Error al sincronizar desde la nube:", e);
  }
}

const VAPID_PUBLIC_KEY = "BJ0ABOIgn6bCsqbafISxwVjqaVxSoKHcU28zFlsU5IYgJehTd6ED9d9Ls4n6SyTk7gk2oaox25aCjaFVzsB5jO4";

function urlB64ToUint8Array(base64String) {
  const padding = "=".repeat((4 - (base64String.length % 4)) % 4);
  const base64 = (base64String + padding).replace(/-/g, "+").replace(/_/g, "/");
  const rawData = atob(base64);
  return Uint8Array.from([...rawData].map((c) => c.charCodeAt(0)));
}

async function registerPushSubscription() {
  if (!("serviceWorker" in navigator) || !("PushManager" in window)) return;
  try {
    const reg = await navigator.serviceWorker.ready;
    let sub = await reg.pushManager.getSubscription();
    if (!sub) {
      sub = await reg.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlB64ToUint8Array(VAPID_PUBLIC_KEY),
      });
    }
    const j = sub.toJSON();
    await sbRequest("POST", "push_subscriptions", [{
      user_id: SB_USER,
      endpoint: j.endpoint,
      p256dh: j.keys.p256dh,
      auth: j.keys.auth,
    }], "?on_conflict=endpoint");
    console.log("[push] Suscripción registrada en Supabase");
  } catch (e) {
    console.warn("[push] No se pudo registrar:", e);
  }
}

async function sendPushNotification(title, body, tag = "pnl") {
  try {
    await fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
      method: "POST",
      headers: { "Content-Type": "application/json", "Authorization": `Bearer ${SUPABASE_ANON_KEY}` },
      body: JSON.stringify({ title, body, tag, user_id: SB_USER }),
    });
  } catch (e) {
    console.warn("[push] Error al enviar notificación:", e);
  }
}

async function requestPushPermission() {
  if (!("Notification" in window)) return "unsupported";
  if (Notification.permission === "granted") { await registerPushSubscription(); return "granted"; }
  if (Notification.permission === "denied") return "denied";
  const result = await Notification.requestPermission();
  if (result === "granted") await registerPushSubscription();
  return result;
}

// Sube TODO el estado local a la nube (úsalo la primera vez para "sembrar" Supabase)
async function syncPushAllToCloud() {
  const p = state.posicoes;

  // Si hay cambios no guardados en posicoes (posicoes.dirty), sincronizamos rows → portfolio
  // ANTES de subir a la nube para que la cantidad de acciones siempre sea la más reciente.
  // Esto evita el caso donde el usuario agregó una transacción (que actualiza rows en memoria)
  // pero nunca tocó "Guardar posiciones" — sin esto, la nube recibiría las cantidades viejas.
  if (p?.dirty && p?.rows?.length) {
    const cleaned = p.rows
      .filter((r) => String(r.ticker).trim())
      .map((r) => ({
        ...r,
        ticker: String(r.ticker).trim().toUpperCase(),
        broker: String(r.broker).trim(),
        quantity: parseNum(r.quantity),
        price: parseNum(r.price) || 0,
        saldo: Math.round(rowEffectiveValue(r) * 100) / 100,
      }));
    state.portfolio = cleaned;
    try { localStorage.setItem("pnl-portfolio", JSON.stringify(state.portfolio)); } catch (_) {}
    p.rows = cleaned.map((r) => ({ ...r }));
    p.dirty = false;
  }

  const portfolioToUpload = p?.rows?.length ? p.rows : state.portfolio;

  const settings = [
    { key: "finnhub-key", user_id: SB_USER, value: p?.finnhubKey || "" },
    { key: "twelvedata-key", user_id: SB_USER, value: p?.apiKey || "" },
    { key: "fx", user_id: SB_USER, value: JSON.stringify(parseNum(p?.fxRateInput) || null) },
    { key: "dividend-tax", user_id: SB_USER, value: p?.dividendTaxPct ?? "30" },
  ].filter((s) => s.value && s.value !== "null" && s.value !== '""');

  await Promise.all([
    sbUpsertHistory(state.history),
    sbUpsertTransactions(state.transactions),
    sbUpsertPortfolio(portfolioToUpload),
    sbUpsertSplits(state.splits || []),
    settings.length ? sbRequest("POST", "settings", settings, "?on_conflict=user_id,key") : Promise.resolve(),
  ]);
  console.log("[supabase] Push completo — todos los datos locales subidos a la nube");
}



loadState();
resetHojeState();
resetPosicoesState();
resetHistoricoState();
render();
startAutoSaveWatcher();
autoFillHistoryGaps();
startAutoRefresh();

// Al abrir: primero subir datos locales a la nube (por si este dispositivo tenía
// datos que la nube no tiene todavía), luego bajar lo nuevo de la nube (por si
// otro dispositivo agregó algo mientras esta tab estaba cerrada). Todo en
// segundo plano — si falla la conexión, la app sigue funcionando normalmente.
syncPushAllToCloud().then(() => syncPullFromCloud());

// Registrar Service Worker (necesario para notificaciones push y modo offline)
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./sw.js").then((reg) => {
    console.log("[sw] Registrado:", reg.scope);
    // Si ya tenía permiso de notificaciones, renovar la suscripción silenciosamente
    if (typeof Notification !== "undefined" && Notification.permission === "granted") {
      registerPushSubscription();
    }
  }).catch((e) => console.warn("[sw] Error al registrar:", e));
}

</script>
