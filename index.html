function renderUnrealized(rows) {
  const withCost = rows.filter((r) => typeof r.avgCost === "number" && r.avgCost > 0);
  if (!withCost.length) return "";
  const fx = parseNum(state.posicoes.fxRateInput);

  let totalCostUsd = 0;
  let totalNowUsd = 0;
  let totalCostBrlKnown = 0; // costo en reales SOLO de los activos con cambio histórico conocido
  let totalNowBrlKnown = 0;
  let approxCostUsd = 0; // costo/valor (US$) de los activos que todavía usan aproximación
  let approxNowUsd = 0;
  let anyApproximated = false;

  const itemsHtml = withCost
    .map((r) => {
      const price = parseNum(r.price);
      const qty = parseNum(r.quantity);
      const costBasisUsd = r.avgCost * qty;
      const hasPrice = price > 0;
      const nowValueUsd = hasPrice ? price * qty : costBasisUsd;
      totalCostUsd += costBasisUsd;
      totalNowUsd += nowValueUsd;
      const gainUsd = nowValueUsd - costBasisUsd;
      const pctUsd = costBasisUsd ? (gainUsd / costBasisUsd) * 100 : 0;

      const hasHistoricalFx = typeof r.avgCostBrl === "number" && r.avgCostBrl > 0;
      let gainBrl = null;
      let approximated = false;
      let fxEffectBrl = null; // parte de la ganancia en reales que viene SOLO del cambio (no del precio)
      if (hasPrice && fx) {
        if (hasHistoricalFx) {
          const costBasisBrl = r.avgCostBrl * qty;
          const nowValueBrl = price * qty * fx;
          gainBrl = nowValueBrl - costBasisBrl;
          // gainBrl = (efecto precio, ya convertido al cambio de HOY) + (efecto cambiario, el
          // resto). El "efecto precio" es exactamente gainUsd × fx — el mismo número que ya se
          // ve reflejado al comparar las columnas Compra/Actual — así el desglose siempre cierra
          // exacto contra esas dos columnas, en vez de mostrar un % que parece no relacionarse
          // con ellas (que es justamente lo que generaba la confusión).
          const priceEffectBrl = gainUsd * fx;
          fxEffectBrl = gainBrl - priceEffectBrl;
          totalCostBrlKnown += costBasisBrl;
          totalNowBrlKnown += nowValueBrl;
        } else {
          gainBrl = gainUsd * fx;
          approximated = true;
          anyApproximated = true;
          approxCostUsd += costBasisUsd;
          approxNowUsd += nowValueUsd;
        }
      }
      const approxBadge = approximated
        ? ` <span class="muted" title="Se usó el cambio de hoy como aproximación: falta el cambio histórico de alguna compra de este activo.">≈</span>`
        : "";
      // El % que se muestra siempre corresponde al precio en dólares (Compra vs Actual), para
      // que nunca contradiga esas dos columnas. El efecto del cambio (cuando se conoce el
      // histórico) se muestra aparte, en reales, como una línea adicional.
      const fxLine =
        fxEffectBrl !== null
          ? `<br><span class="small muted">cambio: ${fxEffectBrl >= 0 ? "+" : ""}${fmtBRL(fxEffectBrl)}</span>`
          : "";
      return `<tr>
        <td><div class="ticker-cell">${avatarHtml(r.ticker, state.posicoes?.logos?.[r.ticker], 20)}<span><b>${escapeHtml(r.ticker)}</b></span></div></td>
        <td class="num small">$${r.avgCost.toFixed(2)}</td>
        <td class="num small">${hasPrice ? "$" + price.toFixed(2) : "—"}</td>
        <td class="num ${hasPrice ? (gainUsd >= 0 ? "up" : "down") : "muted"}"><b>${hasPrice ? (gainBrl !== null ? fmtBRL(gainBrl) : `US$ ${gainUsd.toFixed(2)}`) : "—"}${approxBadge}</b>${hasPrice ? `<br><span class="small">${fmtPct(pctUsd)}</span>${fxLine}` : ""}</td>
      </tr>`;
    })
    .join("");

  const totalGainUsd = totalNowUsd - totalCostUsd;
  const totalPctUsd = totalCostUsd ? (totalGainUsd / totalCostUsd) * 100 : 0;

  // El total combina lo calculado con el cambio histórico real (para los activos que ya lo
  // tienen) con la aproximación al cambio de hoy para el resto — si "anyApproximated" es
  // verdadero, el aviso de abajo deja claro que el total todavía es parcialmente aproximado.
  let totalGainBrl = null;
  let totalPctBrl = totalPctUsd;
  if (fx) {
    const approxGainBrl = (approxNowUsd - approxCostUsd) * fx;
    const totalCostBrlMixed = totalCostBrlKnown + approxCostUsd * fx;
    totalGainBrl = totalNowBrlKnown - totalCostBrlKnown + approxGainBrl;
    totalPctBrl = totalCostBrlMixed ? (totalGainBrl / totalCostBrlMixed) * 100 : 0;
  }

  const ps = state.posicoes;
  const backfillLabel = ps.fxBackfillStatus === "loading" ? "Buscando…" : "Buscar cambios históricos";

  return `<div class="card">
    <div class="card-title-row">
      <h2 class="card-title">Ganancia/pérdida no realizada</h2>
      <span class="${totalGainUsd >= 0 ? "up" : "down"} small"><b>${totalGainBrl !== null ? fmtBRL(totalGainBrl) : `US$ ${totalGainUsd.toFixed(2)}`} (${fmtPct(totalPctBrl)})</b></span>
    </div>
    <p class="muted small">Responde: "si vendiera HOY todo lo que tengo, ¿cuánto ganaría o perdería?". Solo considera el precio de las acciones que <b>todavía tenés</b> — no incluye lo que ya vendiste ni los dividendos cobrados (eso vive en "Rendimiento total", en el Histórico, para no contar nada dos veces).</p>
    <p class="muted small">Compara el precio promedio de compra con el precio actual de cada activo, en dólares${fx ? ". La ganancia/pérdida en reales se separa en el efecto del precio (el % siempre corresponde a comparar Compra vs Actual en dólares) y el efecto del cambio desde el día de cada compra, para que ambos números sean consistentes entre sí." : ". Configura el cambio USD/BRL arriba para verlo también en reales."}</p>
    ${
      anyApproximated
        ? `<div class="banner banner-warn">${icon("alert-triangle", 15)} Los activos marcados con "≈" todavía no tienen el cambio histórico de alguna compra, así que se aproximan con el cambio de HOY — por eso pueden no coincidir con otras apps (como Kinvo), que sí usan el cambio del día de cada compra. Toca "${backfillLabel}" abajo para corregirlo.</div>`
        : ""
    }
    <div class="table-scroll"><table class="table">
      <thead><tr><th>Activo</th><th class="num">Compra</th><th class="num">Actual</th><th class="num">Ganancia</th></tr></thead>
      <tbody>${itemsHtml}</tbody>
    </table></div>
    <div class="row-actions">
      <button class="btn btn-ghost btn-sm" data-action="backfill-fx" ${ps.fxBackfillStatus === "loading" ? "disabled" : ""}>
        ${icon("refresh", 13, ps.fxBackfillStatus === "loading" ? "spin" : "")} ${backfillLabel}
      </button>
    </div>
    ${ps.fxBackfillMessage ? `<div class="banner banner-ok" style="margin-top:10px">${icon("check-circle", 15)} ${escapeHtml(ps.fxBackfillMessage)}</div>` : ""}
    ${
      ps.fxBackfillError
        ? `<div class="banner banner-warn" style="margin-top:10px">${icon("alert-triangle", 15)} ${
            ps.fxBackfillError.length > 1 ? `<ul class="error-list">${ps.fxBackfillError.map((e) => `<li>${escapeHtml(e)}</li>`).join("")}</ul>` : escapeHtml(ps.fxBackfillError[0])
          }</div>`
        : ""
    }
  </div>`;
}

function renderBreakdown(rows) {
  const total = rows.reduce((s, r) => s + rowEffectiveValue(r), 0);
  if (!total) return "";

  const bar = (label, value, color) => {
    const pct = total ? (value / total) * 100 : 0;
    return `<div class="breakdown-row">
      <div class="breakdown-label">${escapeHtml(label)}</div>
      <div class="breakdown-bar-track"><div class="breakdown-bar-fill" style="width:${Math.max(pct, 1).toFixed(1)}%;background:${color}"></div></div>
      <div class="breakdown-pct">${pct.toFixed(1)}%</div>
    </div>`;
  };

  const byTicker = {};
  rows.forEach((r) => { byTicker[r.ticker || "—"] = (byTicker[r.ticker || "—"] || 0) + rowEffectiveValue(r); });
  const tickerRows = Object.entries(byTicker)
    .sort((a, b) => b[1] - a[1])
    .map(([t, v]) => bar(t, v, avatarColor(t)))
    .join("");

  const byBroker = {};
  rows.forEach((r) => { byBroker[r.broker || "—"] = (byBroker[r.broker || "—"] || 0) + rowEffectiveValue(r); });
  const brokerRows = Object.entries(byBroker)
    .sort((a, b) => b[1] - a[1])
    .map(([b, v]) => bar(b, v, avatarColor(b)))
    .join("");

  return `<div class="card">
    <h2 class="card-title">Distribución de la cartera</h2>
    <p class="muted small breakdown-subtitle">Por activo</p>
    ${tickerRows}
    <p class="muted small breakdown-subtitle">Por corretora</p>
    ${brokerRows}
  </div>`;
}

          <a class="muted small" href="https://finnhub.io/register" target="_blank" rel="noopener">Crear clave gratis ↗</a>
        </div>
        <div class="api-key-row">
          <input class="input-cell input-apikey" data-bind="apiKey" value="${escapeAttr(p.apiKey)}" placeholder="Clave de API de Twelve Data (cambio)">

        <p class="upload-hint">El precio (US$) de cada posición se completa automáticamente al actualizar las cotizaciones, pero puedes escribir encima si quieres. Sin precio y cambio, el valor vuelve a ser editable manualmente.</p>
        <p class="upload-hint">Los precios de las acciones vienen de Finnhub (60 consultas/min gratis) y el cambio USD/BRL de Twelve Data (8/min, pero acá solo se pide ese único símbolo).</p>
      </div>

      <div class="card">
        <div class="card-title-row">

          <button class="btn btn-ghost btn-sm" data-action="dedupe-splits" title="Por si una importación anterior dejó una versión sin ajustar de alguna compra junto a la ya corregida">${icon("trash", 13)} Quitar duplicados de un desdoblamiento</button>
          <button class="btn btn-primary btn-sm" data-action="add-split">${icon("plus", 13)} Aplicar desdoblamiento</button>
        </div>
      </div>

      <div class="card">
        <h2 class="card-title">Sincronización en la nube</h2>
        <p class="muted small">Tu cartera se sincroniza automáticamente con Supabase cada vez que guardás algo — historial, posiciones, transacciones, splits. Al abrir la app en cualquier dispositivo, se descarga lo nuevo automáticamente.</p>
        <div class="sync-status-row">
          ${icon("cloud", 15, "up")} <span class="small up">Conectado a Supabase · São Paulo</span>
        </div>
        <div class="row-actions" style="margin-top:10px">
          <button class="btn btn-ghost btn-sm" data-action="sync-push-all">${icon("upload", 13)} Subir todo a la nube</button>
          <button class="btn btn-ghost btn-sm" data-action="sync-pull">${icon("download", 13)} Bajar desde la nube</button>
          <button class="btn btn-ghost btn-sm" data-action="enable-notifications">${icon("bell", 13)} ${typeof Notification !== "undefined" && Notification.permission === "granted" ? "Notificaciones ✓" : "Activar notificaciones"}</button>
        </div>
        <p class="upload-hint">Usa "Subir todo" la primera vez en un dispositivo nuevo para que empiece con todos tus datos. "Bajar desde la nube" fuerza una sincronización manual si algo no llegó.</p>
        <div class="card" style="margin-top:12px;background:var(--bg-app)">
          <h2 class="card-title" style="font-size:13px">Copia de seguridad local</h2>
          <p class="muted small">Exporta un archivo JSON como respaldo adicional.</p>
          <div class="row-actions">
            <button class="btn btn-ghost btn-sm" data-action="export-backup">${icon("download", 13)} Exportar datos</button>
            <button class="btn btn-ghost btn-sm" data-action="trigger-import-backup">${icon("refresh", 13)} Importar datos</button>
          </div>
          <input type="file" id="import-backup-input" accept="application/json" hidden>
        </div>
      </div>
    </div>`;
}

function addRow() {
  state.posicoes.rows = [...state.posicoes.rows, { id: uid(), ticker: "", broker: "", quantity: 0, price: "", saldo: 0 }];
  state.posicoes.dirty = true;
  render();
}

function removeRow(id) {
  state.posicoes.rows = state.posicoes.rows.filter((r) => r.id !== id);
  state.posicoes.dirty = true;
  render();
}

function moveRow(id, direction) {
  const rows = state.posicoes.rows;
  const i = rows.findIndex((r) => r.id === id);
  const j = i + direction;
  if (i === -1 || j < 0 || j >= rows.length) return;
  [rows[i], rows[j]] = [rows[j], rows[i]];
  state.posicoes.dirty = true;
  render();
}

function savePositions() {
  const cleaned = state.posicoes.rows
    .filter((r) => String(r.ticker).trim())
    .map((r) => ({
      ...r,
      ticker: String(r.ticker).trim().toUpperCase(),
      broker: String(r.broker).trim(),
      quantity: parseNum(r.quantity),
      price: parseNum(r.price) || 0,
      saldo: Math.round(rowEffectiveValue(r) * 100) / 100,
    }));
  state.portfolio = cleaned;
  persistPortfolio();
  state.posicoes.rows = cleaned.map((p) => ({ ...p }));
  state.posicoes.dirty = false;
  render();
}

function renderHistorico() {
  const hs = state.historico;
  const importBtnLabel = hs.importStatus === "loading" ? (hs.importProgressLabel || "Buscando…") : "Importar histórico real";
  const importDateRangeHtml = `
    <div class="tx-form-row import-date-row">
      <div class="tx-ticker-wrap">
        <span class="muted small">Desde</span>
        <input class="input-cell tx-date" type="date" data-bind="importFromDate" value="${escapeAttr(hs.importFromDate)}" style="text-align:left">
      </div>
      <div class="tx-ticker-wrap">
        <span class="muted small">Hasta</span>
        <input class="input-cell tx-date" type="date" data-bind="importToDate" value="${escapeAttr(hs.importToDate)}" style="text-align:left">
      </div>
    </div>`;
  const importBanner = hs.importError
    ? `<div class="banner banner-warn">${icon("alert-triangle", 15)} ${
        hs.importError.length > 1 ? `<ul class="error-list">${hs.importError.map((e) => `<li>${escapeHtml(e)}</li>`).join("")}</ul>` : escapeHtml(hs.importError[0])
      }</div>`
    : hs.autoFillNotice
    ? `<div class="banner banner-ok">${icon("refresh", 15, "spin")} ${escapeHtml(hs.autoFillNotice)}</div>`
    : hs.importMessage
    ? `<div class="banner banner-ok">${icon("check-circle", 15)} ${escapeHtml(hs.importMessage)}</div>`
    : "";

  if (!state.history.length) {
    return `
      <div class="card empty-state">
        <p>Todavía no hay resultados guardados.</p>
        <p class="muted small">Calcula el resultado de hoy en la pestaña "Hoy" y guárdalo para empezar el historial, importa los últimos días reales, o prueba la app con datos ficticios.</p>
        ${importBanner}
        ${importDateRangeHtml}
        <button class="btn btn-primary" style="margin-top:14px" data-action="import-real-history" ${hs.importStatus === "loading" ? "disabled" : ""}>
          ${icon("refresh", 15, hs.importStatus === "loading" ? "spin" : "")} ${importBtnLabel}
        </button>
        <button class="btn btn-ghost" style="margin-top:8px" data-action="add-demo">${icon("sparkles", 15)} Generar datos de prueba (14 días)</button>
      </div>`;
  }

  const sorted = [...state.history].sort((a, b) => new Date(a.date) - new Date(b.date));

  const allYears = [...new Set([...sorted.map((h) => new Date(h.date).getFullYear()), ...state.transactions.map((t) => new Date(t.date).getFullYear())])].sort((a, b) => b - a);
  const currentYear = new Date().getFullYear();
  const currentMonthKey = todayYMD().slice(0, 7);
  const pastYears = allYears.filter((y) => y < currentYear);

  const periodFiltered = getPeriodFilteredHistory(hs.periodFilter);

  const periodLabel = { all: "Todo", month: "este mes", year: "este año" }[hs.periodFilter] || `de ${hs.periodFilter}`;
  const periodPillsHtml = `
    <div class="period-pills">
      <button class="period-pill ${hs.periodFilter === "all" ? "active" : ""}" data-action="set-period" data-period="all">Todo</button>
      <button class="period-pill ${hs.periodFilter === "month" ? "active" : ""}" data-action="set-period" data-period="month">Este mes</button>
      <button class="period-pill ${hs.periodFilter === "year" ? "active" : ""}" data-action="set-period" data-period="year">Este año</button>
      ${pastYears.map((y) => `<button class="period-pill ${hs.periodFilter === String(y) ? "active" : ""}" data-action="set-period" data-period="${y}">${y}</button>`).join("")}
    </div>`;

  if (!periodFiltered.length) {
    const txInPeriod = state.transactions.some((t) => {
      const f = hs.periodFilter;
      if (f === "all") return true;
      if (f === "month") return String(t.date).slice(0, 7) === currentMonthKey;
      if (f === "year") return new Date(t.date).getFullYear() === currentYear;
      return String(new Date(t.date).getFullYear()) === f;
    });
    return `
      <div class="stack">
        ${periodPillsHtml}
        <div class="card empty-state">
          <p>No hay registros de seguimiento diario ${periodLabel === "Todo" ? "" : periodLabel}.</p>
          <p class="muted small">${
            txInPeriod
              ? "Sí hay compras/ventas registradas en este período, pero el seguimiento diario (P&L) recién empezó después. Usa \"Importar histórico real\" si quieres rellenar esos días."
              : "Prueba otro período, o vuelve a \"Todo\" para ver el historial completo."
          }</p>
        </div>
      </div>`;
  }

  // El detalle del eje X depende del filtro activo:
  // - "Este mes": un punto por día de ese mes (eje X = número de día).
  // - "Este año" o un año pasado específico: se agrupan los días en MESES (eje X = ene, feb...).
  // - "Todo": se agrupan los días en AÑOS (eje X = 2021, 2022...), ya que mostrar cada registro
  //   individual a lo largo de varios años se ve apretado y las fechas cortas no se leen bien.
  const isMonthView = hs.periodFilter === "month";
  const isYearAggregateView = hs.periodFilter === "year" || /^\d{4}$/.test(hs.periodFilter);
  const isAllView = hs.periodFilter === "all";
  const MONTH_NAMES_SHORT = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];

  let chartData;
  let chartMaxLabels = 6;
  let cum = 0;
  // MEJORA #3 — Rendimiento total acumulado (%), con el método TWR (time-weighted return):
  // se encadena el retorno DIARIO de cada registro ((gain del día + dividendos cobrados ese
  // día) ÷ saldo base de ESE día, que ya viene guardado en rows[].saldo de cada entrada del
  // historial) en vez de dividir la ganancia acumulada en R$ por el saldo actual. Así, a
  // diferencia de "Ganancia/pérdida no realizada" (que solo mira lo que tenés HOY), este % sí
  // cuenta lo que ya vendiste en el camino, y no se distorsiona cuando metes más plata a la
  // cartera o retiras — es el mismo método que usan las plataformas de inversión para mostrar
  // "tu rentabilidad" de forma comparable contra un índice o el CDI.
  //
  // Los dividendos se suman el día en que se cobraron (con la retención de EE. UU. aplicada y
  // convertidos a reales con el cambio histórico de ESE día). Si un dividendo cae en un día sin
  // registro diario guardado (fin de semana, feriado, o un hueco en el historial), se acumula y
  // se suma al primer día CON registro que aparezca después — así nunca se pierde, solo puede
  // quedar desplazado unos días dentro de la cadena.
  const dividendTaxPctForTwr = parseNum(state.posicoes.dividendTaxPct) || 0;
  const fxFallbackForTwr = parseNum(state.posicoes.fxRateInput);
  const dividendsByDayBrl = {};
  if (periodFiltered.length) {
    const periodStartMs = new Date(periodFiltered[0].date).getTime();
    const periodEndMs = new Date(periodFiltered[periodFiltered.length - 1].date).getTime();
    state.transactions
      .filter((t) => t.type === "dividend")
      .forEach((t) => {
        const ts = new Date(t.date).getTime();
        if (!Number.isFinite(ts) || ts < periodStartMs - 86400000 || ts > periodEndMs + 86400000) return; // fuera del período analizado
        const gross = t.qty * t.price;
        const net = gross * (1 - dividendTaxPctForTwr / 100);
        const fxForTx = typeof t.fx === "number" && t.fx > 0 ? t.fx : fxFallbackForTwr;
        if (!fxForTx) return; // sin cambio (ni histórico ni de hoy) no se puede convertir a reales
        const day = String(t.date).slice(0, 10);
        dividendsByDayBrl[day] = (dividendsByDayBrl[day] || 0) + net * fxForTx;
      });
  }
  const dividendDayKeys = Object.keys(dividendsByDayBrl).sort();
  let divPointer = 0;
  let divCarryBrl = 0;
  let twrFactor = 1;
  // Devuelve { totalWithDiv, ret } para un registro del historial, consumiendo (una sola vez,
  // en orden cronológico) los dividendos pendientes hasta esa fecha. NO llamar más de una vez
  // por registro ni fuera de orden, porque el "carry" de dividendos es estado acumulado.
  const dailyFigures = (h) => {
    const entryDay = String(h.date).slice(0, 10);
    while (divPointer < dividendDayKeys.length && dividendDayKeys[divPointer] <= entryDay) {
      divCarryBrl += dividendsByDayBrl[dividendDayKeys[divPointer]];
      divPointer++;
    }
    const divForThisEntry = divCarryBrl;
    divCarryBrl = 0;
    const totalWithDiv = h.total + divForThisEntry;
    const base = h.rows.reduce((s, r) => s + (r.saldo || 0), 0);
    const ret = base > 0 ? totalWithDiv / base : 0;
    return { totalWithDiv, ret };
  };
  if (isYearAggregateView) {
    const byMonth = {};
    const twrByMonth = {};
    periodFiltered.forEach((h) => {
      const { totalWithDiv, ret } = dailyFigures(h);
      const key = String(h.date).slice(0, 7); // YYYY-MM
      byMonth[key] = (byMonth[key] || 0) + totalWithDiv;
      twrFactor *= 1 + ret;
      twrByMonth[key] = (twrFactor - 1) * 100; // se sobreescribe en orden cronológico: queda el último valor del mes
    });
    const monthKeys = Object.keys(byMonth).sort();
    chartData = monthKeys.map((key) => {
      const total = byMonth[key];
      cum += total;
      const m = parseInt(key.slice(5, 7), 10) - 1;
      return { date: MONTH_NAMES_SHORT[m], total, cumulative: cum, cumTwrPct: twrByMonth[key] };
    });
    chartMaxLabels = 12; // como máximo 12 meses, entran todos sin saltarse ninguno
  } else if (isMonthView) {
    chartData = periodFiltered.map((h) => {
      const { totalWithDiv, ret } = dailyFigures(h);
      cum += totalWithDiv;
      twrFactor *= 1 + ret;
      return { date: String(new Date(h.date).getDate()), total: totalWithDiv, cumulative: cum, cumTwrPct: (twrFactor - 1) * 100 };
    });
    chartMaxLabels = 12; // un mes tiene como máximo ~23 días hábiles; con esto entran casi todos
  } else if (isAllView) {
    const byYear = {};
    const twrByYear = {};
    periodFiltered.forEach((h) => {
      const { totalWithDiv, ret } = dailyFigures(h);
      const key = String(h.date).slice(0, 4); // YYYY
      byYear[key] = (byYear[key] || 0) + totalWithDiv;
      twrFactor *= 1 + ret;
      twrByYear[key] = (twrFactor - 1) * 100;
    });
    const yearKeys = Object.keys(byYear).sort();
    chartData = yearKeys.map((key) => {
      const total = byYear[key];
      cum += total;
      return { date: key, total, cumulative: cum, cumTwrPct: twrByYear[key] };
    });
    chartMaxLabels = 12; // normalmente son pocos años; entran todos sin saltarse ninguno
  } else {
    chartData = periodFiltered.map((h) => {
      const { totalWithDiv, ret } = dailyFigures(h);
      cum += totalWithDiv;
      twrFactor *= 1 + ret;
      return { date: fmtShortDate(h.date), total: totalWithDiv, cumulative: cum, cumTwrPct: (twrFactor - 1) * 100 };
    });
  }

  const lineSvg = buildChart({ type: "line", data: chartData, valueKey: "cumulative", labelKey: "date", height: 200, maxLabels: chartMaxLabels });
  const barSvg = buildChart({ type: "bar", data: chartData, valueKey: "total", labelKey: "date", height: 160, maxLabels: chartMaxLabels });
  const twrSvg = buildChart({ type: "line", data: chartData, valueKey: "cumTwrPct", labelKey: "date", height: 180, maxLabels: chartMaxLabels });

  const totalReturnPct = (twrFactor - 1) * 100;
  const firstDate = periodFiltered.length ? fmtFullDate(periodFiltered[0].date) : "";
  const spxLabel = hs.spxStatus === "loading" ? "Comparando…" : "Comparar con S&P 500";
  const spxResultHtml = hs.spxError
    ? `<p class="small down" style="margin-top:8px">${escapeHtml(hs.spxError)}</p>`
    : hs.spxPct !== null
    ? `<p class="small muted" style="margin-top:8px">S&amp;P 500 en el mismo período: <span class="${hs.spxPct >= 0 ? "up" : "down"}"><b>${fmtPct(hs.spxPct)}</b></span> ${
        cum >= 0 === hs.spxPct >= 0 ? (totalReturnPct > hs.spxPct ? "— le vas ganando 🎯" : "— el índice te va ganando") : ""
      }</p>`
    : "";
  const cdiLabel = hs.cdiStatus === "loading" ? "Comparando…" : "Comparar con CDI";
  const cdiResultHtml = hs.cdiError
    ? `<p class="small down" style="margin-top:8px">${escapeHtml(hs.cdiError)}</p>`
    : hs.cdiPct !== null
    ? `<p class="small muted" style="margin-top:8px">CDI en el mismo período: <span class="up"><b>${fmtPct(hs.cdiPct)}</b></span> ${
        totalReturnPct > hs.cdiPct ? "— le vas ganando 🎯" : "— el CDI te va ganando"
      }</p>`
    : "";

  const monthly = {};
  periodFiltered.forEach((h) => {
    const key = String(h.date).slice(0, 7); // YYYY-MM
    monthly[key] = (monthly[key] || 0) + h.total;
  });
  const monthNames = ["ene", "feb", "mar", "abr", "may", "jun", "jul", "ago", "sep", "oct", "nov", "dic"];
  const MONTHLY_COLLAPSED_COUNT = 6;
  const monthlyEntriesSorted = Object.entries(monthly).sort((a, b) => (a[0] < b[0] ? 1 : -1)); // most recent month first
  const monthlyEntriesVisible = hs.monthlyExpanded ? monthlyEntriesSorted : monthlyEntriesSorted.slice(0, MONTHLY_COLLAPSED_COUNT);
  const monthlyRows = monthlyEntriesVisible
    .map(([key, total]) => {
      const [y, m] = key.split("-");
      const label = `${monthNames[parseInt(m, 10) - 1]} ${y}`;
      return `<div class="breakdown-row">
        <div class="breakdown-label" style="text-transform:capitalize">${label}</div>
        <div class="num small ${total >= 0 ? "up" : "down"}" style="flex:1;text-align:right"><b>${fmtBRL(total)}</b></div>
      </div>`;
    })
    .join("");
  const monthlyToggleHtml =
    monthlyEntriesSorted.length > MONTHLY_COLLAPSED_COUNT
      ? `<div class="row-actions">
          <button class="btn btn-ghost btn-sm" data-action="toggle-monthly-expanded">
            ${icon(hs.monthlyExpanded ? "chevron-up" : "chevron-down", 13)} ${hs.monthlyExpanded ? "Mostrar menos" : `Ver los ${monthlyEntriesSorted.length} meses`}
          </button>
        </div>`
      : "";
  const monthlyHtml =
    hs.periodFilter !== "month" && Object.keys(monthly).length > 1
      ? `<div class="card"><h2 class="card-title">Resumen mensual</h2>${monthlyRows}${monthlyToggleHtml}</div>`
      : "";

  const totalReturnHtml = periodFiltered.length
    ? `<div class="card total-return-card">
        <span class="muted small">Rendimiento total desde ${firstDate}</span>
        <span class="total-return-value ${cum >= 0 ? "up" : "down"}">${cum >= 0 ? "+" : ""}${fmtBRL(cum)} (${fmtPct(totalReturnPct)})</span>
        <p class="muted small" style="margin-top:2px">Responde: "¿cómo le fue a mi plata desde que empecé a invertir?". Encadena la variación de cada día (precio + cambio + dividendos cobrados ese día) con el método TWR (retorno ponderado en el tiempo), así no se distorsiona si metiste o sacaste plata en el medio. A diferencia de "Ganancia/pérdida no realizada" (en Posiciones, que solo mira el precio de lo que tenés HOY), acá también se cuenta la ganancia o pérdida de las acciones que ya vendiste en el camino, y los dividendos cobrados.</p>
        <div class="toolbar-row" style="justify-content:flex-start;margin-top:8px">
          <button class="btn btn-ghost btn-sm" data-action="compare-spx" ${hs.spxStatus === "loading" ? "disabled" : ""}>${icon("refresh", 13, hs.spxStatus === "loading" ? "spin" : "")} ${spxLabel}</button>
          <button class="btn btn-ghost btn-sm" data-action="compare-cdi" ${hs.cdiStatus === "loading" ? "disabled" : ""}>${icon("refresh", 13, hs.cdiStatus === "loading" ? "spin" : "")} ${cdiLabel}</button>
        </div>
        ${spxResultHtml}
        ${cdiResultHtml}
      </div>`
    : "";

  const editingEntry = hs.editingId ? state.history.find((h) => h.id === hs.editingId) : null;
  const editCardHtml = editingEntry
    ? `<div class="card">
        <h2 class="card-title">Editando ${fmtFullDate(editingEntry.date)}</h2>
        <div class="table-scroll"><table class="table">
          <thead><tr><th>Activo</th><th class="num">% día</th></tr></thead>
          <tbody>
            ${editingEntry.rows
              .map(
                (r) => `<tr>
              <td><div class="ticker-cell">${avatarHtml(r.ticker, state.posicoes?.logos?.[r.ticker], 20)}<span><b>${escapeHtml(r.ticker)}</b><span class="muted small"> · ${escapeHtml(r.broker)}</span></span></div></td>
              <td class="num"><input class="input-cell" inputmode="decimal" data-bind="editReview" data-id="${r.id}" value="${escapeAttr(hs.editReviewMap[r.id] ?? "0")}"></td>
            </tr>`
              )
              .join("")}
            <tr class="row-fx">
              <td><b>USD/BRL</b><span class="muted small"> · cambio del día</span></td>
              <td class="num"><input class="input-cell" inputmode="decimal" data-bind="editFx" value="${escapeAttr(hs.editFxInput)}"></td>
            </tr>
          </tbody>
        </table></div>
        <div class="row-actions">
          <button class="btn btn-ghost" data-action="cancel-entry-edit">${icon("x", 15)} Cancelar</button>
          <button class="btn btn-primary" data-action="save-entry-edit">${icon("save", 15)} Guardar cambios</button>
        </div>
      </div>`
    : "";

  const RECORDS_COLLAPSED_COUNT = 10;
  const periodFilteredReversed = [...periodFiltered].reverse();
  const recordsVisible = hs.recordsExpanded ? periodFilteredReversed : periodFilteredReversed.slice(0, RECORDS_COLLAPSED_COUNT);
  const rowsHtml = recordsVisible
    .map(
      (h) => `
      <tr>
        <td class="small">${fmtFullDate(h.date)}</td>
        <td class="num small ${h.priceTotal >= 0 ? "up" : "down"}">${fmtBRL(h.priceTotal)}</td>
        <td class="num small ${h.fxGain >= 0 ? "up" : "down"}">${fmtBRL(h.fxGain)}</td>
        <td class="num ${h.total >= 0 ? "up" : "down"}"><b>${fmtBRL(h.total)}</b></td>
        <td>
          <button class="icon-btn" data-action="edit-entry" data-id="${h.id}" title="Editar registro">${icon("pencil", 14)}</button>
          <button class="icon-btn" data-action="remove-entry" data-id="${h.id}" title="Eliminar registro">${icon("trash", 14)}</button>
        </td>
      </tr>`
    )
    .join("");
  const recordsToggleHtml =
    periodFilteredReversed.length > RECORDS_COLLAPSED_COUNT
      ? `<div class="row-actions">
          <button class="btn btn-ghost btn-sm" data-action="toggle-records-expanded">
            ${icon(hs.recordsExpanded ? "chevron-up" : "chevron-down", 13)} ${hs.recordsExpanded ? "Mostrar menos" : `Ver los ${periodFilteredReversed.length} registros`}
          </button>
        </div>`
      : "";

  return `
    <div class="stack">
      ${editCardHtml}
      ${importBanner}
      ${periodPillsHtml}
      <div class="card import-range-card">
        <h2 class="card-title">Importar histórico real</h2>
        ${importDateRangeHtml}
        <div class="row-actions">
          <button class="btn btn-primary btn-sm" data-action="import-real-history" ${hs.importStatus === "loading" ? "disabled" : ""}>
            ${icon("refresh", 13, hs.importStatus === "loading" ? "spin" : "")} ${importBtnLabel}
          </button>
        </div>
      </div>
      <div class="toolbar-row">
        <button class="btn btn-ghost btn-sm" data-action="add-demo">${icon("sparkles", 13)} Generar más datos de prueba</button>
        <button class="btn btn-ghost btn-sm" data-action="export-csv">${icon("download", 13)} Exportar CSV</button>
        <button class="btn btn-ghost btn-sm" data-action="clear-history">${icon("trash", 13)} ${hs.confirmClear ? "¿Confirmar borrado?" : "Borrar historial"}</button>

// MEJORA #1 — El guardado diario automático (a las 20:00 hora de Brasil) solo funciona si la
// app está abierta en ese momento. Si un día no se abrió, ese día queda sin registrar y se
// rompe la reconstrucción "día a día" de la cartera. Esta función corre sola (sin que el
// usuario toque nada) al abrir la app o al entrar a la pestaña "Historial", y rellena
// cualquier hueco entre el último día guardado y hoy reutilizando la misma lógica de
// "Importar histórico real" (datos REALES de Twelve Data, no estimaciones).
let autoFillInProgress = false;
async function autoFillHistoryGaps() {
  if (autoFillInProgress) return;
  const twelveKey = (state.posicoes?.apiKey || "").trim();
  if (!twelveKey) return; // sin clave configurada no hay cómo buscar el histórico real

  const sorted = [...state.history].sort((a, b) => new Date(a.date) - new Date(b.date));
  const lastDate = sorted.length ? dateToBrazilYMD(sorted[sorted.length - 1].date) : null;
  const earliestTx = state.transactions.length
    ? state.transactions.reduce((min, t) => (t.date < min ? t.date : min), state.transactions[0].date).slice(0, 10)
    : null;
  const fromDate = lastDate ? new Date(new Date(`${lastDate}T12:00:00Z`).getTime() + 86400000).toISOString().slice(0, 10) : earliestTx;
  if (!fromDate) return; // todavía no hay ni historial ni transacciones: nada que rellenar
  const toDate = todayYMD();
  if (new Date(fromDate) > new Date(toDate)) return; // ya está al día, no hay huecos

  if (!state.historico) resetHistoricoState();
  state.historico.importFromDate = fromDate;
  state.historico.importToDate = toDate;
  state.historico.autoFillNotice = `Rellenando automáticamente del ${fmtShortDate(fromDate)} a hoy…`;
  autoFillInProgress = true;
  try {
    await importRealHistory();
  } finally {
    autoFillInProgress = false;
    if (state.historico) state.historico.autoFillNotice = null;
  }
}

async function importRealHistory() {
  const h = state.historico;
  const twelveKey = (state.posicoes.apiKey || "").trim();
  if (!twelveKey) {
    h.importError = ["Configura tu clave de API de Twelve Data en la pestaña Posiciones primero."];
    render();
    return;
  }
  const fromDate = h.importFromDate || new Date(Date.now() - 14 * 86400000).toISOString().slice(0, 10);
  const toDate = h.importToDate || todayYMD();
  if (new Date(fromDate) > new Date(toDate)) {
    h.importError = ["La fecha \"desde\" no puede ser posterior a la fecha \"hasta\"."];
    render();
    return;
  }
  h.fromDate = fromDate;
  h.toDate = toDate;
  h.importStatus = "loading";
  h.importError = null;
  h.importMessage = null;
  render();

  // Nota: el histórico de precios de Finnhub (stock/candle) es solo para plan pago,
  // así que esta función usa Twelve Data para todo (acciones + câmbio), igual que antes.
  const tickers = [...new Set(state.portfolio.map((p) => p.ticker).filter(Boolean))];
  const symbols = [...tickers, "USD/BRL"];
  const errors = [];
  const tickerCloses = {}; // ticker -> { 'YYYY-MM-DD': closePrice }
  const fxRates = {}; // 'YYYY-MM-DD' -> rate

  const CHUNK_SIZE = 8;
  const chunks = [];
  for (let i = 0; i < symbols.length; i += CHUNK_SIZE) chunks.push(symbols.slice(i, i + CHUNK_SIZE));

  for (let i = 0; i < chunks.length; i++) {
    const chunk = chunks[i];
    if (i > 0) {
      h.importProgressLabel = `Esperando ~1 min (límite del plan gratis)… grupo ${i + 1}/${chunks.length}`;
      render();
      await new Promise((r) => setTimeout(r, 61000));
    }

    let attempts = 0;
    let done = false;
    while (!done) {
      attempts++;
      h.importProgressLabel = chunks.length > 1 ? `Buscando histórico — grupo ${i + 1}/${chunks.length}…` : "Buscando histórico…";
      render();
      try {
        const url = `https://api.twelvedata.com/time_series?symbol=${chunk.join(",")}&interval=1day&start_date=${h.fromDate}&end_date=${h.toDate}&apikey=${encodeURIComponent(twelveKey)}`;
        const resp = await fetch(url);
        const data = await resp.json();
        if (data && data.status === "error") {
          if (data.code === 429 && attempts < 2) {
            // hit the per-minute limit (likely shared with another recent fetch) — wait and retry this same group once.
            h.importProgressLabel = `Límite del minuto alcanzado, reintentando grupo ${i + 1}/${chunks.length} en ~1 min…`;
            render();
            await new Promise((r) => setTimeout(r, 61000));
            continue;
          }
          errors.push(data.message || "Error al buscar histórico en Twelve Data.");
          done = true;
          continue;
        }
        const shaped = chunk.length === 1 ? { [chunk[0]]: data } : data;
        Object.entries(shaped || {}).forEach(([sym, val]) => {
          if (!val || !Array.isArray(val.values)) { errors.push(`Sin histórico para ${sym}.`); return; }
          const map = {};
          val.values.forEach((v) => {
            const d = String(v.datetime).slice(0, 10);
            const close = parseFloat(v.close);
            if (Number.isFinite(close) && !isNonTradingDay(d)) map[d] = close;
          });
          if (sym === "USD/BRL") Object.assign(fxRates, map);
          else tickerCloses[sym] = map;
        });
        done = true;
      } catch (err) {
        errors.push("No pude buscar histórico en Twelve Data (sin conexión).");
        done = true;
      }
    }
  }
  h.importProgressLabel = null;

  // Day-over-day % change, computed within each series' own trading calendar.
  const tickerChangePct = {};
  const tickerPrevDate = {};
  Object.entries(tickerCloses).forEach(([sym, closesByDate]) => {
    const dates = Object.keys(closesByDate).sort();
    const pctByDate = {};
    const prevByDate = {};
    for (let i = 1; i < dates.length; i++) {
      const prev = closesByDate[dates[i - 1]];
      const curr = closesByDate[dates[i]];
      if (prev) {
        pctByDate[dates[i]] = ((curr - prev) / prev) * 100;
        prevByDate[dates[i]] = dates[i - 1];
      }
    }
    tickerChangePct[sym] = pctByDate;
    tickerPrevDate[sym] = prevByDate;
  });

  const fxDates = Object.keys(fxRates).sort();
  const fxChangePct = {};
  for (let i = 1; i < fxDates.length; i++) {
    const prev = fxRates[fxDates[i - 1]];
    const curr = fxRates[fxDates[i]];
    if (prev) fxChangePct[fxDates[i]] = ((curr - prev) / prev) * 100;
  }

  const allDates = new Set();
  Object.values(tickerChangePct).forEach((m) => Object.keys(m).forEach((d) => allDates.add(d)));
  Object.keys(fxChangePct).forEach((d) => allDates.add(d));

  const existingDates = new Set(state.history.map((e) => String(e.date).slice(0, 10)));
  const totalSaldo = state.portfolio.reduce((s, p) => s + parseNum(p.saldo), 0);

  // Reconstruct how many shares of a ticker were actually held on a given date, from the
  // saved buy/sell transactions — so old imported days reflect the position size you had
  // BACK THEN, not your current (likely larger) position. Falls back to today's saldo for
  // tickers with no transaction history recorded.
  const txByTicker = {};
  state.transactions.forEach((t) => {
    (txByTicker[t.ticker] = txByTicker[t.ticker] || []).push(t);
  });
  const historicalQty = (ticker, dateStr) => {
    const txs = txByTicker[ticker];
    if (!txs) return null;
    const cutoff = new Date(`${dateStr}T23:59:59`).getTime();
    let qty = 0;
    let any = false;
    txs.forEach((t) => {
      if (new Date(t.date).getTime() > cutoff) return;
      if (t.type === "dividend") return; // un dividendo no cambia la cantidad de acciones
      any = true;
      qty += t.type === "buy" ? t.qty : -t.qty;
    });
    return any ? qty : 0;
  };
  const historicalValueBrl = (p, dateStr) => {
    const qty = historicalQty(p.ticker, dateStr);
    const priceUsd = tickerCloses[p.ticker]?.[dateStr];
    const fx = fxRates[dateStr];
    if (qty === null || !priceUsd || !fx) return null; // can't reconstruct, caller should fall back
    return qty * priceUsd * fx;
  };

  // When the same ticker is split across more than one row/broker, divide the reconstructed
  // historical quantity between them using each row's share of today's quantity for that
  // ticker — otherwise every row sharing a ticker would each get the FULL historical amount,
  // double (or more) counting the gain.
  const tickerTotalQtyToday = {};
  state.portfolio.forEach((p) => {
    tickerTotalQtyToday[p.ticker] = (tickerTotalQtyToday[p.ticker] || 0) + parseNum(p.quantity);
  });
  const rowShareOfTicker = (p) => {
    const total = tickerTotalQtyToday[p.ticker];
    if (!total) return 1; // only row for this ticker (or no current quantity on file) — take it all
    return parseNum(p.quantity) / total;
  };

  const newEntries = [...allDates]
    .filter((d) => !existingDates.has(d) && !isNonTradingDay(d))
    .sort()
    .map((d) => {
      let totalSaldoForDate = 0;
      let hadAnyReconstruction = false;
      const rows = state.portfolio.map((p) => {
        const pct = tickerChangePct[p.ticker]?.[d] ?? 0;
        const prevDate = tickerPrevDate[p.ticker]?.[d];
        let saldo = parseNum(p.saldo); // fallback: today's value
        if (prevDate) {
          const histValue = historicalValueBrl(p, prevDate);
          if (histValue !== null) {
            saldo = histValue * rowShareOfTicker(p);
            hadAnyReconstruction = true;
          }
        }
        totalSaldoForDate += saldo;
        return { id: p.id, ticker: p.ticker, broker: p.broker, saldo, changePct: pct, gain: (saldo * pct) / 100 };
      });
      const priceTotal = rows.reduce((s, r) => s + r.gain, 0);
      const fxPct = fxChangePct[d] ?? 0;
      const fxGain = ((hadAnyReconstruction ? totalSaldoForDate : totalSaldo) * fxPct) / 100;
      return { id: `real-${d}`, date: `${d}T12:00:00`, rows, fxPct, fxGain, priceTotal, total: priceTotal + fxGain };
    });

  state.history = [...state.history, ...newEntries].sort((a, b) => new Date(a.date) - new Date(b.date));
  persistHistory();

  h.importStatus = "idle";
  h.importError = errors.length ? errors : null;
  h.importMessage = newEntries.length
    ? `${newEntries.length} día(s) importado(s) con datos reales.`
    : errors.length
    ? null
    : "No hay días nuevos para importar (esos días ya estaban en el historial).";
  render();
}

function downloadBlob(content, filename, mime) {
  const blob = new Blob([content], { type: mime });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url;
  a.download = filename;
  document.body.appendChild(a);
  a.click();
  a.remove();
  setTimeout(() => URL.revokeObjectURL(url), 1000);
}

function parseCsvLine(line, delimiter = ",") {
  const out = [];
  let cur = "";
  let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (inQuotes) {
      if (c === '"' && line[i + 1] === '"') { cur += '"'; i++; }
      else if (c === '"') inQuotes = false;
      else cur += c;
    } else if (c === '"') inQuotes = true;
    else if (c === delimiter) { out.push(cur); cur = ""; }
    else cur += c;
  }
  out.push(cur);
  return out;
}

function addTransaction() {
  const p = state.posicoes;
  const f = p.txForm;
  const qty = parseNum(f.qty);
  const price = parseNum(f.price);
  f.error = null;

  if (!qty || qty <= 0) { f.error = "Ingresa una cantidad válida (mayor a 0)."; render(); return; }
  if ((f.type === "buy" || f.type === "dividend") && (!price || price <= 0)) { f.error = "Ingresa un precio válido (mayor a 0)."; render(); return; }

  // Si la operación es de hoy, el cambio USD/BRL configurado arriba YA ES el cambio histórico
  // correcto para esa fecha — se guarda directo en la transacción. Si es una fecha pasada, se
  // deja en null y se completa después con "Buscar cambios históricos".
  const fxForTx = f.date === todayYMD() ? parseNum(p.fxRateInput) || null : null;

  let ticker;
  if (f.rowId === "__new__") {
    if (f.type === "dividend") { f.error = "Un dividendo se registra sobre una posición que ya existe. Selecciónala en \"Posición\"."; render(); return; }
    ticker = f.newTicker.trim().toUpperCase();
    if (!ticker) { f.error = "Ingresa el ticker de la nueva posición."; render(); return; }
    if (f.type === "sell") { f.error = "No se puede vender algo que todavía no está en tu carteira. Agrégalo como compra primero."; render(); return; }
    const newRow = { id: uid(), ticker, broker: f.newBroker.trim(), quantity: qty, avgCost: price, avgCostBrl: fxForTx ? price * fxForTx : null, price: "", saldo: 0 };
    p.rows = [...p.rows, newRow];
    p.dirty = true;
    f.rowId = newRow.id;
    state.transactions.push({ id: uid(), source: "manual", ticker, date: new Date(`${f.date}T12:00:00`).toISOString(), type: f.type, qty, price, fx: fxForTx });
  } else {
    const row = p.rows.find((r) => r.id === f.rowId);
    if (!row) { f.error = "No encontré esa posición."; render(); return; }
    ticker = row.ticker;
    const oldQty = parseNum(row.quantity);
    if (f.type === "buy") {
      row.quantity = oldQty + qty;
      p.dirty = true;
    } else if (f.type === "sell") {
      if (qty > oldQty + 0.0001) { f.error = `Esa posición solo tiene ${oldQty} unidades — no se puede vender ${qty}.`; render(); return; }
      row.quantity = Math.max(oldQty - qty, 0);
      p.dirty = true;
    }
    // El dividendo NO modifica row.quantity: es un ingreso, no cambia cuántas acciones tienes.
    state.transactions.push({ id: uid(), source: "manual", ticker: row.ticker, date: new Date(`${f.date}T12:00:00`).toISOString(), type: f.type, qty, price: price || row.avgCost || 0, fx: fxForTx });
  }
  persistTransactions();

  // El precio promedio (en US$ y, si hay datos suficientes, en R$) se recalcula siempre a
  // partir de TODO el historial de transacciones, con el método de costo promedio. Se aplica
  // solo a la fila donde se registró esta transacción (no a otras filas que compartan el mismo
  // ticker en otra corretora, que pueden tener un costo real distinto no reflejado aquí).
  // recomputeCostBasisFromTransactions ignora las filas "dividend" (solo mira buy/sell), así
  // que registrar un dividendo nunca altera el precio promedio de compra.
  // Nota: f.rowId ya fue reasignado al id real de la fila más arriba, aunque haya empezado en "__new__".
  const { avgCostUsd, avgCostBrl } = recomputeCostBasisFromTransactions(ticker);
  p.rows = p.rows.map((r) => (r.id === f.rowId ? { ...r, avgCost: avgCostUsd, avgCostBrl } : r));
  state.portfolio = state.portfolio.map((r) => (r.id === f.rowId ? { ...r, avgCost: avgCostUsd, avgCostBrl } : r));

  f.qty = "";
  f.price = "";
  f.newTicker = "";
  f.newBroker = "";
  f.tickerSearchResults = [];
  render();
}

// Aviso automático de dividendos faltantes ("híbrido": el monto NETO siempre se carga a mano
// o por CSV, porque ninguna API gratis devuelve el monto neto real después de la retención de
// EE. UU. — esto solo avisa que un pago existió, usando el endpoint de dividendos de Finnhub,
// que en el plan gratis puede no estar disponible para todos los tickers; si no lo está, se
// avisa y no rompe nada — los dividendos siguen pudiendo registrarse a mano o por CSV).
async function checkMissingDividends() {
  const p = state.posicoes;
  const finnhubKey = (p.finnhubKey || "").trim();
  if (!finnhubKey) {
    p.dividendCheckError = "Configura tu clave de Finnhub (arriba) para poder buscar dividendos pendientes.";
    render();
    return;
  }
  p.dividendCheckStatus = "loading";
  p.dividendCheckError = null;
  p.missingDividends = [];
  render();

  const tickers = [...new Set(state.portfolio.map((r) => r.ticker).filter(Boolean))];
  const earliestTx = state.transactions.length
    ? state.transactions.reduce((min, t) => (t.date < min ? t.date : min), state.transactions[0].date).slice(0, 10)
    : new Date(Date.now() - 365 * 86400000).toISOString().slice(0, 10);
  const toDate = todayYMD();

  const existingByTicker = {};
  state.transactions
    .filter((t) => t.type === "dividend")
    .forEach((t) => { (existingByTicker[t.ticker] = existingByTicker[t.ticker] || []).push(String(t.date).slice(0, 10)); });

  const found = [];
  let blocked = false;
  await Promise.all(
    tickers.map(async (sym) => {
      try {
        const url = `https://finnhub.io/api/v1/stock/dividend?symbol=${encodeURIComponent(sym)}&from=${earliestTx}&to=${toDate}&token=${encodeURIComponent(finnhubKey)}`;
        const resp = await fetch(url);
        if (resp.status === 403 || resp.status === 401) { blocked = true; return; }
        const data = await resp.json();
        if (!Array.isArray(data)) return;
        data.forEach((d) => {
          const perShare = parseFloat(d.amount);
          const payDate = String(d.payDate || d.date || "").slice(0, 10);
          if (!perShare || !payDate) return;
          // tolerancia de unos días: la fecha que el usuario cargó (pago real) puede no
          // coincidir exactamente con la que reporta la API (ex-date vs. pay date).
          const already = (existingByTicker[sym] || []).some((ed) => Math.abs(new Date(`${ed}T12:00:00`) - new Date(`${payDate}T12:00:00`)) < 6 * 86400000);
          if (!already) found.push({ ticker: sym, date: payDate, perShare });
        });
      } catch (_) {
        // sin conexión u otro error puntual para este ticker: se ignora y se sigue con el resto
      }
    })
  );

  p.dividendCheckStatus = "idle";
  p.missingDividends = found.sort((a, b) => new Date(b.date) - new Date(a.date));
  p.dividendCheckError = blocked
    ? "Tu plan de Finnhub no incluye histórico de dividendos para estos activos (suele requerir un plan pago) — puedes seguir registrándolos a mano o por CSV."
    : found.length
    ? null
    : "No encontré dividendos pagados que no tengas ya registrados.";
  render();
}

function importPurchasesFile(file) {
  const p = state.posicoes;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const lines = String(reader.result).split(/\r?\n/).filter((l) => l.trim());
      if (!lines.length) throw new Error("vacío");
      // Algunos exportadores (p. ej. Excel configurado en español/portugués) usan ";" como
      // separador en vez de ",". Se detecta mirando cuál aparece más veces en el encabezado.
      const delimiter = (lines[0].match(/;/g) || []).length > (lines[0].match(/,/g) || []).length ? ";" : ",";
      const header = parseCsvLine(lines[0], delimiter).map((h) => h.trim().toLowerCase());
      const idx = {
        symbol: header.indexOf("symbol"),
        date: header.indexOf("date"),
        type: header.indexOf("type"),
        qty: header.indexOf("qty"),
        price: header.indexOf("price"),
        fx: header.indexOf("fx"), // opcional: Kinvo exporta esta columna con el cambio USD/BRL de cada operación
      };
      if (idx.symbol === -1 || idx.type === -1 || idx.qty === -1 || idx.price === -1) {
        throw new Error("Faltan columnas (symbol, type, qty, price)");
      }

      const txs = lines.slice(1).map((l) => parseCsvLine(l, delimiter)).filter((c) => c.length >= 4);
      // sort chronologically so sells reduce the running average cost correctly, oldest first.
      txs.sort((a, b) => new Date(a[idx.date]) - new Date(b[idx.date]));

      // Some exports show Qty as a plain decimal (e.g. "80.96"). Others show it as an
      // integer count of THOUSANDTHS of a share, with commas only as thousands grouping
      // (e.g. "1,070" meaning 1.070 shares, "977" meaning 0.977 shares — no literal decimal
      // point anywhere in the column). Detect which convention this file uses by checking
      // whether any Qty value in the whole file contains a ".".
      const qtyHasDecimalPoint = txs.some((cols) => String(cols[idx.qty] || "").includes("."));
      const parseQty = (raw) => {
        const s = String(raw ?? "").trim();
        if (qtyHasDecimalPoint) return parseNum(s);
        const intVal = parseFloat(s.replace(/,/g, ""));
        return Number.isFinite(intVal) ? intVal / 1000 : 0;
      };

      // Keep a persisted record of every transaction (deduped), so the app remembers how far
      // back your investing history goes — used e.g. to build the year filters in Historial.
      const txKey = (t) => `${t.ticker}|${t.date}|${t.type}|${t.qty.toFixed(4)}|${t.price.toFixed(4)}`;
      const existingKeys = new Set(state.transactions.map(txKey));
      let fxBackfilledFromCsv = 0;
      let dividendsImported = 0;
      txs.forEach((cols) => {
        const rawSym = (cols[idx.symbol] || "").trim();
        const sym = rawSym.includes(":") ? rawSym.split(":").pop() : rawSym;
        if (!sym) return;
        const type = (cols[idx.type] || "").trim().toLowerCase();
        // "dividend" usa la misma columna "type" que buy/sell. El monto BRUTO (antes de la
        // retención de EE. UU.) se guarda igual que una compra/venta: qty × price, donde price
        // es el dividendo bruto por acción en US$ — así un split aplicado más tarde a ese
        // ticker (qty×ratio, price÷ratio) sigue dejando el monto bruto total correcto.
        if (type !== "buy" && type !== "sell" && type !== "dividend") return;
        const dateRaw = cols[idx.date] || "";
        const date = dateRaw ? new Date(dateRaw).toISOString() : new Date().toISOString();
        const fxFromFile = idx.fx !== -1 ? parseNum(cols[idx.fx]) || null : null;
        // Si ya se registró un desdoblamiento para este ticker, la fila cruda del CSV (con la
        // cantidad/precio originales, sin ajustar) se ajusta a la MISMA escala que ya tienen
        // las transacciones guardadas — así una reimportación no agrega una versión duplicada
        // y desajustada de una compra que ya estaba correctamente ajustada por el split.
        const { qty: adjQty, price: adjPrice } = applySplitsToRawValue(sym, date, parseQty(cols[idx.qty]), parseNum(cols[idx.price]));
        const rec = { ticker: sym, date, type, qty: adjQty, price: adjPrice, fx: fxFromFile };
        const key = txKey(rec);
        if (!existingKeys.has(key)) {
          existingKeys.add(key);
          state.transactions.push({ id: uid(), source: "csv", ...rec });
          if (type === "dividend") dividendsImported++;
        } else if (fxFromFile) {
          // Esta transacción ya estaba guardada (de una importación anterior, posiblemente de
          // un archivo sin la columna "fx") — si todavía no tenía el cambio histórico, se
          // completa ahora con el de este archivo en vez de descartarlo.
          const existingIdx = state.transactions.findIndex((t) => txKey(t) === key && !(typeof t.fx === "number" && t.fx > 0));
          if (existingIdx !== -1) {
            state.transactions[existingIdx] = { ...state.transactions[existingIdx], fx: fxFromFile };
            fxBackfilledFromCsv++;
          }
        }
      });
      persistTransactions();

      // Limpieza defensiva: si una importación ANTERIOR a este arreglo ya dejó guardada una
      // versión cruda (sin ajustar) de alguna compra afectada por un split junto a la versión
      // correcta, se elimina la cruda ahora.
      const duplicatesRemoved = dedupeSplitDuplicateTransactions();

      // El precio promedio se recalcula a partir de TODO el historial de transacciones ya
      // persistido (no solo de las filas de este archivo), para que sea correcto incluso si
      // el CSV importado es parcial o se reimporta más de una vez.
      const tickersInFile = new Set();
      txs.forEach((cols) => {
        const rawSym = (cols[idx.symbol] || "").trim();
        const sym = rawSym.includes(":") ? rawSym.split(":").pop() : rawSym;
        if (sym) tickersInFile.add(sym);
      });
      state.splits.forEach((s) => tickersInFile.add(s.ticker)); // por si la limpieza afectó un ticker que no estaba en este archivo

      let matched = 0;
      tickersInFile.forEach((sym) => {
        const { avgCostUsd, avgCostBrl } = recomputeCostBasisFromTransactions(sym);
        if (avgCostUsd === null) return;
        matched++;
        applyAvgCostToTickerRows(sym, avgCostUsd, avgCostBrl);
      });
      persistPortfolio();
      resetPosicoesState();
      state.posicoes.quotesError = matched || dividendsImported
        ? null
        : ["No encontré ningún ticker de ese archivo que coincida con tu carteira."];
      state.posicoes.importPurchasesMessage = matched
        ? `Precio de compra actualizado para ${matched} activo(s).` +
          (dividendsImported ? ` Se importaron ${dividendsImported} dividendo(s).` : "") +
          (fxBackfilledFromCsv ? ` Se completó el cambio histórico (columna "fx") de ${fxBackfilledFromCsv} transacción(es) que ya tenías guardadas.` : "") +
          (duplicatesRemoved ? ` Se eliminaron ${duplicatesRemoved} transacción(es) duplicada(s) (de una versión sin ajustar por un desdoblamiento).` : "")
        : dividendsImported
        ? `Se importaron ${dividendsImported} dividendo(s).`
        : null;
      render();
    } catch (err) {
      p.quotesError = ["No pude leer ese CSV. Revisa que tenga las columnas symbol, date, type, qty, price (formato de TradingView)."];
      render();
    }
  };
  reader.readAsText(file);
}

function importBackupFile(file) {
  const p = state.posicoes;
  const reader = new FileReader();
  reader.onload = () => {
    try {
      const data = JSON.parse(reader.result);
      if (!data || data.type !== "pnl-tracker-backup" || !Array.isArray(data.portfolio)) {
        p.quotesError = ["Ese archivo no parece ser una copia de seguridad válida de esta app."];
        render();
        return;
      }
      state.portfolio = data.portfolio;
      state.history = Array.isArray(data.history) ? data.history : [];
      state.transactions = Array.isArray(data.transactions) ? data.transactions : [];
      state.splits = Array.isArray(data.splits) ? data.splits : [];
      persistTransactions();
      persistSplits();
      try {
        localStorage.setItem("pnl-twelvedata-key", data.apiKey || "");
        localStorage.setItem("pnl-finnhub-key", data.finnhubKey || "");
        localStorage.setItem("pnl-quotes", JSON.stringify(data.quotes || {}));
        localStorage.setItem("pnl-logos", JSON.stringify(data.logos || {}));
        localStorage.setItem("pnl-fx", JSON.stringify(typeof data.fxRateInput === "string" ? parseNum(data.fxRateInput) : data.fxRateInput || null));
        if (data.dividendTaxPct !== undefined && data.dividendTaxPct !== null && data.dividendTaxPct !== "") {
          localStorage.setItem("pnl-dividend-tax", String(data.dividendTaxPct));
        }
      } catch (_) {}
      persistPortfolio();
      persistHistory();
      resetPosicoesState();
      state.posicoes.quotesError = null;
      state.posicoes.dirty = false;
      render();
    } catch (err) {
      p.quotesError = ["No pude leer ese archivo (¿es un JSON válido exportado desde esta app?)."];
      render();
    }
  };
  reader.readAsText(file);
}

function csvEscape(v) {
  const s = String(v ?? "");
  return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
}

function exportCsv() {
  const tickers = [...new Set(state.portfolio.map((p) => p.ticker).filter(Boolean))];
  const header = ["fecha", "precios_brl", "cambio_brl", "total_brl", ...tickers.map((t) => `${t}_%`)];
  const lines = [header.map(csvEscape).join(",")];
  [...state.history]
    .sort((a, b) => new Date(a.date) - new Date(b.date))
    .forEach((h) => {
      const pctByTicker = {};
      h.rows.forEach((r) => { pctByTicker[r.ticker] = r.changePct; });
      const row = [
        fmtFullDate(h.date),
        h.priceTotal.toFixed(2),
        h.fxGain.toFixed(2),
        h.total.toFixed(2),
        ...tickers.map((t) => (typeof pctByTicker[t] === "number" ? pctByTicker[t].toFixed(4) : "")),
      ];
      lines.push(row.map(csvEscape).join(","));
    });
  downloadBlob(lines.join("\n"), `pnl-historial-${todayYMD()}.csv`, "text/csv;charset=utf-8");
}

/* ---------------------------------------------------------------------- */
/*  Top-level render & event wiring                                       */
/* ---------------------------------------------------------------------- */

function switchTab(tab) {
  state.tab = tab;
  if (tab === "hoje") syncHojeOnTabEnter();
  else if (tab === "posicoes") resetPosicoesState();
  else if (tab === "historico") {
    resetHistoricoState();
    autoFillHistoryGaps(); // dispara en segundo plano; importRealHistory() ya hace su propio render()
  }
  render();
}

// A diferencia de resetHojeState() (que se usa para descartar/cancelar a propósito), esta
// función se llama cada vez que se vuelve a la pestaña "Hoy" navegando desde otra pestaña.
// Antes llamaba directo a resetHojeState(), que si hoy todavía no estaba guardado en el
// historial (por ejemplo, una vista previa de "Actualizar variación"/pegar/manual que el
// usuario no llegó a guardar) la reseteaba a "idle" y borraba esa vista previa — eso era lo
// que hacía "desaparecer" el banner y el total con variación al navegar entre pestañas y
// volver a "Hoy". Ahora solo se sincroniza con el historial (por si se guardó automáticamente
// mientras el usuario estaba en otra pestaña); si no hay nada guardado pero ya existe una
// vista previa en memoria ("result"/"review"), se conserva tal cual.
function syncHojeOnTabEnter() {
  const todayEntry = state.history.find((e) => dateToBrazilYMD(e.date) === brazilTodayYMD());
  if (!todayEntry && state.hoje && (state.hoje.status === "result" || state.hoje.status === "review")) {
    return; // hay una vista previa sin guardar: no la pisamos
  }
  resetHojeState();
}

function render() {
  const root = document.getElementById("app");
  // El total del header debe ser siempre el mismo sin importar la pestaña activa.
  // Antes, en "Hoy"/"Historial" se usaba el saldo PERSISTIDO (state.portfolio.saldo,
  // que solo se actualiza al presionar "Guardar posiciones"), mientras que en
  // "Posiciones" se usaba el valor EN VIVO (cantidad × precio × cambio actuales).
  // Si actualizabas cotizaciones sin guardar, ambos números se desincronizaban y
  // el total "saltaba" al cambiar de pestaña. state.posicoes.rows ya existe desde
  // el arranque (resetPosicoesState() corre en la inicialización) y se mantiene
  // sincronizado en vivo, así que usarlo siempre evita esa inconsistencia.
  const rowsForTotal = state.posicoes ? state.posicoes.rows : state.portfolio;
  const totalSaldo = rowsForTotal.reduce((s, r) => s + rowEffectiveValue(r), 0);
  const totalUsd = rowsForTotal.reduce((s, r) => s + rowEffectiveValueUsd(r), 0);
  const isUsd = state.displayCurrency === "USD";
  const displayedTotal = isUsd ? (totalUsd ? fmtUSD(totalUsd) : "— US$") : fmtBRL(totalSaldo);
  const lastEntry = state.history.length ? state.history[state.history.length - 1] : null;
  const isTodayEntry = lastEntry && dateToBrazilYMD(lastEntry.date) === brazilTodayYMD();
  // Si hoy todavía no está guardado en el historial pero hay una vista previa calculada
  // (estado "result", desde "Buscar variación automáticamente"/pegar/llenar manualmente),
  // se usa esa vista previa para que la variación del día aparezca en el saldo total
  // (número grande) del header en todas las pestañas, no solo después de guardarse.
  const dayChangeSource = isTodayEntry ? lastEntry : state.hoje && state.hoje.status === "result" ? state.hoje.result : null;
  const fxRate = parseNum(state.posicoes?.fxRateInput);
  const fxRateHtml = fxRate ? `<span class="header-fx-rate muted small">US$ 1 = R$ ${fxRate.toFixed(4)}</span>` : "";
  const dayChangeHtml = dayChangeSource
    ? `<span class="header-total-change ${dayChangeSource.total >= 0 ? "up" : "down"}">${dayChangeSource.total >= 0 ? "+" : ""}${fmtBRL(dayChangeSource.total)} (${fmtPct(totalSaldo ? (dayChangeSource.total / totalSaldo) * 100 : 0)})</span>`
    : "";

  root.innerHTML = `
    <div class="app">
      <header class="header">
        <div class="header-top">
          <div>
            <div class="brand-eyebrow">CARTERA INTERNACIONAL</div>
            <h1 class="brand-title">P&amp;L Diario</h1>
          </div>
          <div class="header-right">
            <button class="theme-toggle" data-action="toggle-theme" title="Cambiar tema">${icon("sun", 15, "theme-icon-light")}${icon("moon", 15, "theme-icon-dark")}</button>
            <button class="install-pill" id="install-btn" data-action="install-app" hidden>${icon("download", 13)} Instalar app</button>
            <div class="header-total">
              <div class="header-total-toprow">
                <span class="header-total-label">Saldo total</span>
                <button class="currency-toggle" data-action="toggle-currency">${isUsd ? "US$" : "R$"} ⇄</button>
              </div>
              <span class="header-total-value" id="header-total-value">${displayedTotal}</span>
              ${dayChangeHtml}
              ${fxRateHtml}
            </div>
          </div>
        </div>
        ${renderTickerTape(state.portfolio, dayChangeSource)}
      </header>

      <nav class="tabbar">
        <button class="tab ${state.tab === "hoje" ? "tab-active" : ""}" data-action="switch-tab" data-tab="hoje">${icon("wallet", 15)} Hoy</button>
        <button class="tab ${state.tab === "posicoes" ? "tab-active" : ""}" data-action="switch-tab" data-tab="posicoes">${icon("list-checks", 15)} Posiciones</button>
        <button class="tab ${state.tab === "historico" ? "tab-active" : ""}" data-action="switch-tab" data-tab="historico">${icon("history", 15)} Historial</button>
      </nav>

      <main class="main">
        ${state.tab === "hoje" ? renderHoje() : state.tab === "posicoes" ? renderPosicoes() : renderHistorico()}
      </main>
    </div>`;

  if (deferredInstallPrompt) {
    const btn = document.getElementById("install-btn");
    if (btn) btn.hidden = false;
  }
}

function handleAction(action, el) {
  const id = el.dataset.id;
  switch (action) {
    case "switch-tab": switchTab(el.dataset.tab); break;
    case "start-manual": startManual(); break;
    case "fetch-live-day-change": fetchLiveDayChange(); break;
    case "parse-pasted": parsePasted(); break;
    case "edit-review": state.hoje.status = "review"; render(); break;
    case "cancel-review": resetHojeState(); render(); break;
    case "compute": compute(); break;
    case "discard-result": resetHojeState(); render(); break;
    case "new-entry": resetHojeState(); render(); break;
    case "add-row": addRow(); break;
    case "remove-row": removeRow(id); break;
    case "move-row-up": moveRow(id, -1); break;
    case "move-row-down": moveRow(id, 1); break;
    case "save-positions": savePositions(); break;
    case "export-backup": exportBackup(); break;
    case "sync-push-all": syncPushAllToCloud().then(() => { alert("✅ Todos tus datos fueron subidos a la nube."); }); break;
    case "sync-pull": syncPullFromCloud().then(() => { alert("✅ Sincronización desde la nube completada."); }); break;
    case "enable-notifications":
      requestPushPermission().then((r) => {
        if (r === "granted") alert("✅ Notificaciones activadas. Te avisaremos cuando el historial se guarde y si hay movimientos fuertes.");
        else if (r === "denied") alert("❌ Bloqueaste las notificaciones. Para activarlas, permitilas desde el ícono del candado en la barra del navegador.");
        else if (r === "unsupported") alert("Tu navegador no soporta notificaciones push.");
        render();
      });
      break;
    case "trigger-import-backup": document.getElementById("import-backup-input")?.click(); break;
    case "trigger-import-purchases": document.getElementById("import-purchases-input")?.click(); break;
    case "add-transaction": addTransaction(); break;
    case "check-missing-dividends": checkMissingDividends(); break;
    case "toggle-dividends-expanded": state.posicoes.dividendsExpanded = !state.posicoes.dividendsExpanded; render(); break;
    case "quickadd-dividend": {
      const f = state.posicoes.txForm;
      const row = state.posicoes.rows.find((r) => r.ticker === el.dataset.ticker);
      f.rowId = row ? row.id : "__new__";
      f.type = "dividend";
      f.date = el.dataset.date;
      f.price = el.dataset.price;
      f.qty = row ? String(row.quantity) : "";
      render();
      break;
    }
    case "add-split": addSplitAction(); break;
    case "dedupe-splits": dedupeSplitsManualAction(); break;
    case "remove-split": removeSplitAction(id); break;
    case "select-ticker-result": selectTickerResult(el.dataset.symbol); break;
    case "fetch-quotes": fetchQuotes(); break;
    case "backfill-fx": backfillHistoricalFx(); break;
    case "add-demo": addDemo(); break;
    case "import-real-history": importRealHistory(); break;
    case "export-csv": exportCsv(); break;
    case "edit-entry": startEditEntry(id); break;
    case "compare-spx": compareSpx(); break;
    case "compare-cdi": compareCdi(); break;
    case "toggle-records-expanded": state.historico.recordsExpanded = !state.historico.recordsExpanded; render(); break;
    case "toggle-monthly-expanded": state.historico.monthlyExpanded = !state.historico.monthlyExpanded; render(); break;
    case "set-period":
      state.historico.periodFilter = el.dataset.period;
      // El resultado de "Comparar con S&P 500/CDI" quedó calculado para el período ANTERIOR;
      // se limpia para que no parezca que ya compara el período nuevo sin haber tocado el botón.
      state.historico.spxPct = null;
      state.historico.spxError = null;
      state.historico.cdiPct = null;
      state.historico.cdiError = null;
      render();
      break;
    case "cancel-entry-edit": cancelEditEntry(); break;
    case "save-entry-edit": saveEntryEdit(); break;
    case "clear-history": clearHistoryAction(); break;
    case "remove-entry": removeEntryAction(id); break;
    case "install-app": installApp(); break;
    case "toggle-currency":
      state.displayCurrency = state.displayCurrency === "USD" ? "BRL" : "USD";
      try { localStorage.setItem("pnl-currency", state.displayCurrency); } catch (_) {}
      render();
      break;
    case "toggle-theme": {
      const next = document.documentElement.dataset.theme === "light" ? "dark" : "light";
      document.documentElement.dataset.theme = next;
      try { localStorage.setItem("pnl-theme", next); } catch (_) {}
      break;
    }
  }
}

const root = document.getElementById("app");

// Algunos campos (tasa de retención de dividendos, % manual de Ibovespa, vista previa de
// dividendo) necesitan un render() completo para reflejarse en otras partes de la pantalla,
// pero un render() completo reemplaza todo el HTML y el navegador pierde el foco del input
// donde se está escribiendo. Esta función guarda qué input (y qué posición del cursor) estaba
// enfocado, renderiza, y reenfoca el mismo input en el mismo lugar — así escribir no salta.
function renderPreservingFocus() {
  const active = document.activeElement;
  const sel =
    active && active.matches && active.matches("[data-bind]")
      ? { bind: active.dataset.bind, id: active.dataset.id, start: active.selectionStart, end: active.selectionEnd }
      : null;
  render();
  if (sel) {
    const elSel = sel.id ? `[data-bind="${sel.bind}"][data-id="${sel.id}"]` : `[data-bind="${sel.bind}"]`;
    const el = root.querySelector(elSel);
    if (el) {
      el.focus();
      if (typeof el.setSelectionRange === "function" && sel.start != null) {
        try { el.setSelectionRange(sel.start, sel.end); } catch (_) {}
      }
    }
  }
}

root.addEventListener("click", (e) => {
  const el = e.target.closest("[data-action]");
  if (!el || el.disabled) return;
  handleAction(el.dataset.action, el);
});

root.addEventListener("input", (e) => {
  const el = e.target.closest("[data-bind]");
  if (!el) return;
  const bind = el.dataset.bind;
  const id = el.dataset.id;

  if (bind === "review") {
    state.hoje.reviewMap[id] = el.value;
  } else if (bind === "fx") {
    state.hoje.fxPctInput = el.value;
  } else if (bind === "editReview") {
    state.historico.editReviewMap[id] = el.value;
  } else if (bind === "editFx") {
    state.historico.editFxInput = el.value;
  } else if (bind === "importFromDate") {
    state.historico.importFromDate = el.value;
  } else if (bind === "importToDate") {
    state.historico.importToDate = el.value;
  } else if (bind === "paste") {
    state.hoje.pasteText = el.value;
    const btn = document.querySelector('[data-action="parse-pasted"]');
    if (btn) btn.disabled = !el.value.trim();
    if (state.hoje.error) {
      // clear stale error banner without a full re-render (keeps focus in the textarea)
      state.hoje.error = null;
      const banner = root.querySelector(".banner-warn");
      if (banner) banner.remove();
    }
  } else if (bind === "apiKey") {
    state.posicoes.apiKey = el.value;
    persistQuotesCache();
  } else if (bind === "finnhubKey") {
    state.posicoes.finnhubKey = el.value;
    persistQuotesCache();
  } else if (bind === "fxRate") {
    state.posicoes.fxRateInput = el.value;
    persistQuotesCache();
    state.posicoes.rows.forEach((r) => updateRowValueCell(r.id));
    updateLiveTotal();
  } else if (bind === "txNewTicker") {
    state.posicoes.txForm.newTicker = el.value;
    searchTickerDebounced(el.value);
  } else if (bind === "txNewBroker") {
    state.posicoes.txForm.newBroker = el.value;
  } else if (bind === "txQty") {
    state.posicoes.txForm.qty = el.value;
    if (state.posicoes.txForm.type === "dividend") renderPreservingFocus(); // refresca la vista previa bruto/neto
  } else if (bind === "txPrice") {
    state.posicoes.txForm.price = el.value;
    if (state.posicoes.txForm.type === "dividend") renderPreservingFocus();
  } else if (bind === "txDate") {
    state.posicoes.txForm.date = el.value;
  } else if (bind === "dividendTaxPct") {
    state.posicoes.dividendTaxPct = el.value;
    persistQuotesCache();
    renderPreservingFocus();
  } else if (bind === "splitTicker") {
    state.posicoes.splitForm.ticker = el.value;
  } else if (bind === "splitDate") {
    state.posicoes.splitForm.date = el.value;
  } else if (bind === "splitRatio") {
    state.posicoes.splitForm.ratio = el.value;
  } else if (["ticker", "broker", "quantity", "price", "saldo"].includes(bind)) {
    const row = state.posicoes.rows.find((r) => r.id === id);
    if (row) {
      row[bind] = el.value;
      state.posicoes.dirty = true;
      const saveBtn = document.querySelector('[data-action="save-positions"]');
      if (saveBtn) saveBtn.disabled = false;
      if (bind === "quantity" || bind === "price") {
        updateRowValueCell(id);
        updateLiveTotal();
      } else if (bind === "saldo") {
        updateLiveTotal();
      }
    }
  }
});

let deferredInstallPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById("install-btn");
  if (btn) btn.hidden = false;
});

function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(() => {
    deferredInstallPrompt = null;
    const btn = document.getElementById("install-btn");
    if (btn) btn.hidden = true;
  });
}

window.addEventListener("appinstalled", () => {
  deferredInstallPrompt = null;
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}

/*  Guardado automático del resultado diario después de las 20:00 (Brasil) */
/* ---------------------------------------------------------------------- */

let autoSaveInProgress = false;

async function maybeAutoSaveToday() {
  if (autoSaveInProgress) return;
  if (!isPastAutoSaveTime()) return;
  if (isMarketClosedToday()) return; // fin de semana o feriado bursátil: nada nuevo que calcular
  if (state.history.some((e) => dateToBrazilYMD(e.date) === brazilTodayYMD())) return; // hoy ya está guardado
  if (state.hoje.fetchStatus === "loading") return;
  if (state.hoje.status === "review") return; // hay una edición manual en curso, no interrumpir

  // Si ya hay un resultado calculado en pantalla (por ejemplo el usuario buscó/pegó los datos
  // pero no llegó a guardar), se usa ese mismo resultado en vez de volver a buscar cotizaciones.
  if (state.hoje.status === "result" && state.hoje.result) {
    autoSaveInProgress = true;
    try {
      saveHistoryAction();
    } finally {
      autoSaveInProgress = false;
    }
    return;
  }

  const finnhubKey = (state.posicoes.finnhubKey || "").trim();
  const twelveKey = (state.posicoes.apiKey || "").trim();
  if (!finnhubKey && !twelveKey) return; // sin claves configuradas no hay cómo calcular nada

  autoSaveInProgress = true;
  try {
    await fetchLiveDayChange({ autoSave: true });
  } finally {
    autoSaveInProgress = false;
  }
}

function startAutoSaveWatcher() {
  maybeAutoSaveToday();
  setInterval(maybeAutoSaveToday, 60000);
}

// Auto-refresh de cotizaciones cada 30 minutos SOLO durante el horario de mercado de EE. UU.
// (9:30 - 16:00 ET, lunes a viernes). Fuera de ese horario no consume créditos de API.
// Cada dispositivo con la app abierta corre su propio timer — con 2 dispositivos y 8 activos
// el consumo es ~208 créditos/día (muy por debajo del límite de 800 del plan gratuito).
const MARKET_OPEN_HOUR_ET = 9;   // 9:30 ET
const MARKET_OPEN_MIN_ET = 30;
const MARKET_CLOSE_HOUR_ET = 16; // 16:00 ET
const AUTO_REFRESH_INTERVAL_MS = 30 * 60 * 1000; // 30 minutos

function isMarketOpen() {
  if (isMarketClosedToday()) return false; // fin de semana o feriado
  // La zona horaria ET (Eastern Time) es UTC-5 en invierno y UTC-4 en verano. En vez de
  // importar una librería de tz, usamos Intl para leer la hora local en ET directamente.
  try {
    const etNow = new Date().toLocaleString("en-US", { timeZone: "America/New_York", hour: "numeric", minute: "numeric", hour12: false });
    const [hStr, mStr] = etNow.split(":");
    const h = parseInt(hStr, 10);
    const m = parseInt(mStr, 10);
    const minutesSinceMidnight = h * 60 + m;
    const open = MARKET_OPEN_HOUR_ET * 60 + MARKET_OPEN_MIN_ET;
    const close = MARKET_CLOSE_HOUR_ET * 60;
    return minutesSinceMidnight >= open && minutesSinceMidnight < close;
  } catch (_) {
    // Intl no disponible en algún navegador muy viejo — asumimos mercado abierto para no
    // perder la actualización (el consumo de créditos ya es muy bajo de todas formas).
    return true;
  }
}

async function autoRefreshQuotes() {
  if (!isMarketOpen()) return; // fuera del horario, no hacer nada
  const finnhubKey = (state.posicoes?.finnhubKey || "").trim();
  if (!finnhubKey) return; // sin clave no hay precio que buscar
  // Si hay una edición manual en curso en la pestaña "Hoy", no interrumpir
  if (state.hoje?.status === "review") return;
  // Actualiza tanto los precios en posicoes como el banner de variación del día
  await fetchLiveDayChange();
}

function startAutoRefresh() {
  // El primer tick ocurre al abrir la app (si el mercado está abierto), luego cada 30 min.
  autoRefreshQuotes();
  setInterval(autoRefreshQuotes, AUTO_REFRESH_INTERVAL_MS);
}

// Cuando el usuario vuelve a la pestaña/ventana después de tenerla en segundo plano, puede
// haber pasado más de 30 min y el timer interno puede haberse "pausado" (los navegadores
// limitan los timers en tabs inactivas). Por eso al recuperar el foco también se refresca.
document.addEventListener("visibilitychange", () => {
  if (document.visibilityState === "visible") autoRefreshQuotes();
});
