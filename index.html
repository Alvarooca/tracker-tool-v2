<!DOCTYPE html>
<html lang="pt-BR">
<head>

<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; }

.app {
  background: #0A0D10;
  color: #ECEFF2;
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding-bottom: 32px;
}

.header { border-bottom: 1px solid #1C2128; background: linear-gradient(180deg, #0F1318 0%, #0A0D10 100%); }
.header-top { display: flex; justify-content: space-between; align-items: flex-end; padding: 20px 18px 14px; gap: 12px; flex-wrap: wrap; }
.brand-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: #E8B339; margin-bottom: 4px; }
.brand-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-total { text-align: right; display: flex; flex-direction: column; }
.header-total-label { font-size: 11px; color: #7A8290; margin-bottom: 2px; }
.header-total-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; }

.install-pill { background: transparent; border: 1px solid #E8B339; color: #E8B339; font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; padding: 7px 11px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; }
.install-pill[hidden] { display: none; }

.tape { overflow: hidden; border-top: 1px solid #1C2128; background: #0D1115; padding: 9px 0; }
.tape-track { display: flex; gap: 28px; white-space: nowrap; animation: scroll-tape 30s linear infinite; padding-left: 18px; width: max-content; }
@media (prefers-reduced-motion: reduce) { .tape-track { animation: none; } }
@keyframes scroll-tape { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.tape-item { font-family: 'IBM Plex Mono', monospace; font-size: 12px; display: inline-flex; gap: 7px; align-items: center; color: #C7CCD3; }
.tape-item b { color: #ECEFF2; font-weight: 600; }

.tabbar { display: flex; gap: 4px; padding: 10px 14px 0; }
.tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: transparent; border: none; color: #7A8290; font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; padding: 10px 8px; border-radius: 8px 8px 0 0; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-active { color: #ECEFF2; border-bottom: 2px solid #E8B339; background: #12161B; }

.main { padding: 16px 14px 0; max-width: 720px; margin: 0 auto; }
.stack { display: flex; flex-direction: column; gap: 14px; }

.card { background: #12161B; border: 1px solid #1C2128; border-radius: 12px; padding: 16px; }
.card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; margin: 0; }

.upload-card, .center-card { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; padding: 30px 16px; }
.upload-text { color: #ABB2BC; font-size: 13px; max-width: 340px; line-height: 1.5; }
.upload-hint { color: #4A5360; font-size: 11px; max-width: 300px; line-height: 1.4; margin-top: -4px; }
.paste-area { width: 100%; max-width: 360px; min-height: 70px; background: #0D1115; border: 1px solid #232932; color: #ECEFF2; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; padding: 10px; border-radius: 8px; resize: vertical; }
.paste-area:focus { outline: none; border-color: #E8B339; }
.divider-text { color: #4A5360; font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin: 4px 0; }

.btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border-radius: 8px; padding: 10px 16px; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; border: 1px solid transparent; background: none; }
.btn-primary { background: #E8B339; color: #15130A; }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: transparent; color: #C7CCD3; border: 1px solid #232932; }
.btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
.icon-btn { background: transparent; border: none; color: #7A8290; cursor: pointer; padding: 4px; display: inline-flex; }
.icon-btn:hover { color: #FF6B6B; }

.row-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.toolbar-row { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
.btn-sm { padding: 6px 11px; font-size: 11.5px; }

.table { width: 100%; border-collapse: collapse; font-size: 13px; }
.table th { text-align: left; color: #7A8290; font-weight: 500; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; padding: 6px 6px; border-bottom: 1px solid #1C2128; }
.table td { padding: 9px 6px; border-bottom: 1px solid #161A20; font-family: 'IBM Plex Mono', monospace; }
.table td:first-child { font-family: 'Inter', sans-serif; }
.table .num { text-align: right; }
.row-fx td { background: #0F1318; }

.up { color: #1FD8A4; }

.input-cell { width: 100%; background: #0D1115; border: 1px solid #232932; color: #ECEFF2; font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 6px 8px; border-radius: 6px; text-align: right; }
.input-cell:focus { outline: none; border-color: #E8B339; }

<body>
<div id="app"></div>

<script>
/* ---------------------------------------------------------------------- */
/*  Constants & helpers                                                   */
/* ---------------------------------------------------------------------- */

const DEFAULT_PORTFOLIO = [
  { id: "pg-etrade", ticker: "PG", broker: "E*TRADE", quantity: 80.96, saldo: 58007.2 },
  { id: "ko-ms", ticker: "KO", broker: "Morgan Stanley", quantity: 97.32, saldo: 39919.13 },
  { id: "wmb-nomad", ticker: "WMB", broker: "Nomad", quantity: 32.23, saldo: 12626.73 },
  { id: "usb-nomad", ticker: "USB", broker: "Nomad", quantity: 31.28, saldo: 8574.66 },
  { id: "tm-nomad", ticker: "TM", broker: "Nomad", quantity: 7.36, saldo: 7029.68 },
  { id: "arkb-nomad", ticker: "ARKB", broker: "Nomad", quantity: 39.43, saldo: 5107.62 },
  { id: "arcc-nomad", ticker: "ARCC", broker: "Nomad", quantity: 21.8, saldo: 2050.72 },
  { id: "pg-nomad", ticker: "PG", broker: "Nomad", quantity: 0.89, saldo: 639.55 },
  { id: "sgov-nomad", ticker: "SGOV", broker: "Nomad", quantity: 1.0, saldo: 505.93 },
];

const parseNum = (v) => {
  if (typeof v === "number") return v;
  const n = parseFloat(String(v ?? "").trim().replace(",", "."));
  return Number.isFinite(n) ? n : 0;
};

const fmtBRL = (v) => (v ?? 0).toLocaleString("pt-BR", { style: "currency", currency: "BRL" });

const fmtPct = (v) => `${v >= 0 ? "+" : ""}${(v ?? 0).toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%`;

const fmtShortDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString("pt-BR", { day: "2-digit", month: "2-digit" });
};

const fmtFullDate = (iso) => {
  const d = new Date(iso);
  return `${d.toLocaleDateString("pt-BR")} · ${d.toLocaleTimeString("pt-BR", { hour: "2-digit", minute: "2-digit" })}`;
};

const uid = () => `row-${Date.now()}-${Math.floor(Math.random() * 10000)}`;

const escapeHtml = (s) => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
const escapeAttr = (s) => escapeHtml(s).replace(/"/g, "&quot;");

const DEMO_VOLATILITY = {
  PG: [-1.5, 3.5],
  KO: [-1, 3],
  WMB: [-2.5, 2.5],
  USB: [-1, 2.5],
  TM: [-2, 1.5],
  ARCC: [-1, 1.5],
  ARKB: [-5, 5],
  SGOV: [-0.05, 0.08],
};
const DEMO_FX_RANGE = [-1, 2];

const randIn = ([min, max]) => min + Math.random() * (max - min);

const generateDemoEntries = (portfolio, days = 14) => {
  const totalSaldo = portfolio.reduce((s, p) => s + parseNum(p.saldo), 0);
  const entries = [];
  let cursor = new Date();
  while (entries.length < days) {
    cursor = new Date(cursor.getTime() - 86400000);
    const dow = cursor.getDay();
    if (dow === 0 || dow === 6) continue; // pula fins de semana
    const fxPct = randIn(DEMO_FX_RANGE);
    const rows = portfolio.map((p) => {
      const range = DEMO_VOLATILITY[p.ticker] || [-2, 2];
      const changePct = randIn(range);
      const saldo = parseNum(p.saldo);
      return { id: p.id, ticker: p.ticker, broker: p.broker, saldo, changePct, gain: (saldo * changePct) / 100 };
    });
    const priceTotal = rows.reduce((s, r) => s + r.gain, 0);
    const fxGain = (totalSaldo * fxPct) / 100;
    entries.push({
      id: `demo-${cursor.getTime()}`,
      date: cursor.toISOString(),
      rows,
      fxPct,
      fxGain,
      priceTotal,
      total: priceTotal + fxGain,
    });
  }
  return entries.reverse();
};

/* ---------------------------------------------------------------------- */
/*  Icons (hand-drawn, dependency-free)                                   */
/* ---------------------------------------------------------------------- */

const ICON_PATHS = {
  wallet: '<path d="M3 7h14a2 2 0 0 1 2 2v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7Z"/><path d="M16 7V5a2 2 0 0 0-2-2H6a2 2 0 0 0-2 2v2"/><path d="M16 13h3"/>',
  refresh: '<path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/><path d="M3 21v-5h5"/>',
  save: '<path d="M5 4h11l3 3v13H5z"/><path d="M8 4v6h8V4"/><path d="M8 20v-6h8v6"/>',
  trash: '<path d="M4 7h16"/><path d="M9 7V4h6v3"/><path d="M6 7l1 13h10l1-13"/>',
  plus: '<path d="M12 5v14"/><path d="M5 12h14"/>',
  x: '<path d="M6 6l12 12"/><path d="M18 6L6 18"/>',
  "check-circle": '<circle cx="12" cy="12" r="9"/><path d="M8 12l3 3 5-6"/>',
  "alert-triangle": '<path d="M12 4l9 16H3z"/><path d="M12 10v4"/><path d="M12 17h.01"/>',
  history: '<circle cx="12" cy="12" r="9"/><path d="M12 7v5l4 2"/>',
  "list-checks": '<path d="M4 6h2"/><path d="M9 6h11"/><path d="M4 12h2"/><path d="M9 12h11"/><path d="M4 18h2"/><path d="M9 18h11"/>',
  pencil: '<path d="M4 20l4-1 11-11-3-3L5 16z"/><path d="M14 6l3 3"/>',
  sparkles: '<path d="M12 3l1.5 4.5L18 9l-4.5 1.5L12 15l-1.5-4.5L6 9l4.5-1.5z"/><path d="M19 14l.6 1.8 1.8.6-1.8.6L19 19l-.6-1.8-1.8-.6 1.8-.6z"/>',
  camera: '<path d="M4 8h3l2-3h6l2 3h3v11H4z"/><circle cx="12" cy="13.5" r="3.5"/>',
  download: '<path d="M12 3v12"/><path d="M7 11l5 5 5-5"/><path d="M5 20h14"/>',
};

function icon(name, size = 15, cls = "") {
  const paths = ICON_PATHS[name] || "";
  return `<svg class="icon ${cls}" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${paths}</svg>`;
}

/* ---------------------------------------------------------------------- */
/*  State & persistence (localStorage)                                    */
/* ---------------------------------------------------------------------- */

const state = {
  tab: "hoje",
  portfolio: DEFAULT_PORTFOLIO.map((p) => ({ ...p })),
  history: [],
  hoje: null,
  posicoes: null,
  historico: null,
};

function loadState() {
  try {
    const p = localStorage.getItem("pnl-portfolio");
    if (p) state.portfolio = JSON.parse(p);
  } catch (_) {}
  try {
    const h = localStorage.getItem("pnl-history");
    if (h) state.history = JSON.parse(h);
  } catch (_) {}
}

function persistPortfolio() {
  try {
    localStorage.setItem("pnl-portfolio", JSON.stringify(state.portfolio));
  } catch (_) {}
}

function persistHistory() {
  try {
    localStorage.setItem("pnl-history", JSON.stringify(state.history));
  } catch (_) {}
}

function resetHojeState() {
  state.hoje = { status: "idle", error: null, reviewMap: {}, fxPctInput: "0", result: null, updateSaldo: false, pasteText: "" };
}
function loadQuotesCache() {
  let apiKey = "", quotes = {}, fxRateInput = "", quotesUpdatedAt = null;
  try { apiKey = localStorage.getItem("pnl-twelvedata-key") || ""; } catch (_) {}
  try { quotes = JSON.parse(localStorage.getItem("pnl-quotes") || "{}"); } catch (_) {}
  try {
    const fx = JSON.parse(localStorage.getItem("pnl-fx") || "null");
    fxRateInput = typeof fx === "number" ? String(fx) : "";
  } catch (_) {}
  try { quotesUpdatedAt = localStorage.getItem("pnl-quotes-updated-at") || null; } catch (_) {}
  return { apiKey, quotes, fxRateInput, quotesUpdatedAt };
}

function persistQuotesCache() {
  const p = state.posicoes;
  try {
    localStorage.setItem("pnl-twelvedata-key", p.apiKey || "");
    localStorage.setItem("pnl-quotes", JSON.stringify(p.quotes || {}));
    localStorage.setItem("pnl-fx", JSON.stringify(parseNum(p.fxRateInput) || null));
    if (p.quotesUpdatedAt) localStorage.setItem("pnl-quotes-updated-at", p.quotesUpdatedAt);
  } catch (_) {}
}

function resetPosicoesState() {
  const cache = loadQuotesCache();
  state.posicoes = {
    rows: state.portfolio.map((p) => ({ ...p, price: typeof p.price === "number" || typeof p.price === "string" ? p.price : (cache.quotes[p.ticker] ?? "") })),
    dirty: false,
    apiKey: cache.apiKey,
    quotes: cache.quotes,
    fxRateInput: cache.fxRateInput,
    quotesUpdatedAt: cache.quotesUpdatedAt,
    quotesStatus: "idle",
    quotesProgressLabel: null,
    quotesError: null,
  };
}

function rowComputedValue(r) {
  const fx = parseNum(state.posicoes.fxRateInput);
  const price = parseNum(r.price);
  const qty = parseNum(r.quantity);
  if (!fx || !price) return null;
  return qty * price * fx;
}

function timeAgoLabel(iso) {
  if (!iso) return "";
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diffMs / 60000);
  if (mins < 1) return "atualizado agora";
  if (mins < 60) return `atualizado há ${mins} min`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `atualizado há ${hours}h`;
  return `atualizado em ${fmtShortDate(iso)}`;
}

async function fetchQuotes() {
  const p = state.posicoes;
  const apiKey = (p.apiKey || "").trim();
  if (!apiKey) {
    p.quotesError = ["Informe sua chave de API da Twelve Data para buscar cotações (é gratuita)."];
    render();
    return;
  }
  p.quotesStatus = "loading";
  p.quotesError = null;
  render();

  const tickers = [...new Set(state.portfolio.map((r) => r.ticker).filter(Boolean))];
  const errors = [];

  // 1) USD/BRL — tries Frankfurter first (ECB data), falls back to ExchangeRate-API's
  // open endpoint if the first one is unreachable (e.g. blocked by a network/carrier).
  // Neither touches Twelve Data's quota.
  const fxPromise = (async () => {
    try {
      const r = await fetch("https://api.frankfurter.app/latest?from=USD&to=BRL");
      const data = await r.json();
      const rate = data?.rates?.BRL;
      if (typeof rate === "number") { p.fxRateInput = String(rate); return; }
      throw new Error("sem dado");
    } catch (_) {
      try {
        const r2 = await fetch("https://open.er-api.com/v6/latest/USD");
        const data2 = await r2.json();
        const rate2 = data2?.rates?.BRL;
        if (typeof rate2 === "number") { p.fxRateInput = String(rate2); return; }
        throw new Error("sem dado 2");
      } catch (_2) {
        errors.push("Não consegui obter o câmbio USD/BRL automaticamente. Digite manualmente o valor.");
      }
    }
  })();

  // 2) Stock prices via Twelve Data — batched in groups of 8 symbols to respect the
  // free plan's limit of 8 API credits per minute (each symbol = 1 credit per request).
  const CHUNK_SIZE = 8;
  const chunks = [];
  for (let i = 0; i < tickers.length; i += CHUNK_SIZE) chunks.push(tickers.slice(i, i + CHUNK_SIZE));

  const newQuotes = { ...p.quotes };

  const quotesPromise = (async () => {
    for (let i = 0; i < chunks.length; i++) {
      const chunk = chunks[i];
      if (i > 0) {
        p.quotesProgressLabel = `Aguardando ~1 min (limite do plano gratuito)… grupo ${i + 1}/${chunks.length}`;
        render();
        await new Promise((r) => setTimeout(r, 61000)); // stay under the per-minute credit cap
      }
      p.quotesProgressLabel = chunks.length > 1 ? `Buscando grupo ${i + 1}/${chunks.length}…` : null;
      render();
      try {
        const url = `https://api.twelvedata.com/price?symbol=${chunk.join(",")}&apikey=${encodeURIComponent(apiKey)}`;
        const resp = await fetch(url);
        const data = await resp.json();
        if (data && data.status === "error") {
          errors.push(data.message || "Erro ao buscar preços na Twelve Data.");
          continue;
        }
        const shaped = chunk.length === 1 ? { [chunk[0]]: data } : data;
        Object.entries(shaped || {}).forEach(([sym, val]) => {
          if (!val || typeof val !== "object" || val.status === "error" || !val.price) {
            errors.push(`Sem cotação para ${sym}.`);
            return;
          }
          const num = parseFloat(val.price);
          if (Number.isFinite(num)) newQuotes[sym] = num;
        });
      } catch (err) {
        errors.push("Não consegui buscar preços na Twelve Data (sem conexão).");
      }
    }
    p.quotesProgressLabel = null;
  })();

  await Promise.all([fxPromise, quotesPromise]);

  p.quotes = newQuotes;
  p.quotesUpdatedAt = new Date().toISOString();
  p.quotesError = errors.length ? errors : null;
  p.rows = p.rows.map((r) => ({ ...r, price: typeof newQuotes[r.ticker] === "number" ? newQuotes[r.ticker] : r.price }));
  persistQuotesCache();

  p.quotesStatus = "idle";
  render();
}
function resetHistoricoState() {
  state.historico = { confirmClear: false };
}

/* ---------------------------------------------------------------------- */
/*  Charts (lightweight inline SVG, no dependencies)                      */
/* ---------------------------------------------------------------------- */

function fmtK(v) {
  return `${(v / 1000).toFixed(1)}k`;
}

function buildChart({ type, data, valueKey, labelKey, height = 180 }) {
  const W = 600, H = height;
  const padL = 40, padR = 8, padT = 10, padB = 22;
  const innerW = W - padL - padR;
  const innerH = H - padT - padB;
  const values = data.map((d) => d[valueKey]);
  let min = Math.min(0, ...values);
  let max = Math.max(0, ...values);
  if (min === max) max = min + 1;
  const range = max - min;
  min -= range * 0.08;
  max += range * 0.08;

  const xStep = data.length > 1 ? innerW / (data.length - 1) : 0;
  const xFor = (i) => (data.length > 1 ? padL + i * xStep : padL + innerW / 2);
  const yFor = (v) => padT + innerH - ((v - min) / (max - min)) * innerH;
  const zeroY = yFor(0);

  let gridLines = "";
  const gridCount = 4;
  for (let g = 0; g <= gridCount; g++) {
    const gy = padT + (innerH / gridCount) * g;
    const val = max - (g / gridCount) * (max - min);
    gridLines += `<line class="chart-grid" x1="${padL}" y1="${gy}" x2="${W - padR}" y2="${gy}" stroke="#1C2128" stroke-width="1"/>`;
    gridLines += `<text x="${padL - 6}" y="${gy + 3}" text-anchor="end">${fmtK(val)}</text>`;
  }

  const maxLabels = 6;
  const skip = Math.max(1, Math.ceil(data.length / maxLabels));
  let xLabels = "";
  data.forEach((d, i) => {
    if (i % skip === 0 || i === data.length - 1) {
      xLabels += `<text x="${xFor(i)}" y="${H - 4}" text-anchor="middle">${escapeHtml(d[labelKey])}</text>`;
    }
  });

  let body = "";
  if (type === "line") {
    const points = data.map((d, i) => `${xFor(i)},${yFor(d[valueKey])}`).join(" ");
    body += `<polyline points="${points}" fill="none" stroke="#1FD8A4" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>`;
    data.forEach((d, i) => {
      body += `<circle cx="${xFor(i)}" cy="${yFor(d[valueKey])}" r="2.5" fill="#1FD8A4"/>`;
    });
  } else if (type === "bar") {
    const bw = Math.min(28, (innerW / data.length) * 0.6);
    data.forEach((d, i) => {
      const v = d[valueKey];
      const y = Math.min(yFor(v), zeroY);
      const h = Math.max(2, Math.abs(yFor(v) - zeroY));
      const x = xFor(i) - bw / 2;
      const color = v >= 0 ? "#1FD8A4" : "#FF6B6B";
      body += `<rect x="${x}" y="${y}" width="${bw}" height="${h}" rx="3" fill="${color}"/>`;
    });
    body += `<line x1="${padL}" y1="${zeroY}" x2="${W - padR}" y2="${zeroY}" stroke="#2A313B" stroke-width="1"/>`;
  }

  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="${H}" role="img" aria-label="Gráfico">${gridLines}${body}${xLabels}</svg>`;
}

function renderTickerTape(portfolio, lastEntry) {
  const uniqueTickers = [...new Set(portfolio.map((p) => p.ticker))];
  const itemsByTicker = {};
  if (lastEntry) lastEntry.rows.forEach((r) => { itemsByTicker[r.ticker] = r.changePct; });
  const tapeItems = uniqueTickers.map((t) => ({ ticker: t, pct: itemsByTicker[t] }));
  if (lastEntry) tapeItems.push({ ticker: "USD/BRL", pct: lastEntry.fxPct });
  const doubled = [...tapeItems, ...tapeItems];
  const itemsHtml = doubled
    .map(
      (it) =>
        `<span class="tape-item"><b>${escapeHtml(it.ticker)}</b>${
          typeof it.pct === "number" ? `<span class="${it.pct >= 0 ? "up" : "down"}">${fmtPct(it.pct)}</span>` : `<span class="muted">—</span>`
        }</span>`
    )
    .join("");
  return `<div class="tape"><div class="tape-track">${itemsHtml}</div></div>`;
}

function startManual() {
  const map = {};
  state.portfolio.forEach((p) => (map[p.id] = "0"));
  state.hoje.reviewMap = map;
  state.hoje.fxPctInput = "0";
  state.hoje.error = null;
  state.hoje.status = "review";
  render();
}

function parsePasted() {
  const text = state.hoje.pasteText;
  const regex = /([A-Za-zÀ-ÿ\/]{2,12})\s*[:=]\s*([+-]?\d+(?:[.,]\d+)?)\s*%?/g;
  const found = {};
  let m;
  while ((m = regex.exec(text)) !== null) found[m[1].toUpperCase()] = parseNum(m[2]);
  if (!Object.keys(found).length) {
    state.hoje.error = "Não consegui reconhecer nenhum valor nesse texto. Confira o formato e tente de novo.";
    render();
    return;
  }
  const map = {};
  state.portfolio.forEach((p) => {
    const v = found[p.ticker.toUpperCase()];
    map[p.id] = typeof v === "number" ? String(v) : "0";
  });
  state.hoje.reviewMap = map;
  const fx = found["USDBRL"] ?? found["USD/BRL"] ?? found["USD"];
  state.hoje.fxPctInput = typeof fx === "number" ? String(fx) : "0";
  state.hoje.error = null;
  state.hoje.status = "review";
  render();
}

function compute() {
  const h = state.hoje;
  const rows = state.portfolio.map((p) => {
    const pct = parseNum(h.reviewMap[p.id]);
    const saldo = parseNum(p.saldo);
    return { id: p.id, ticker: p.ticker, broker: p.broker, saldo, changePct: pct, gain: (saldo * pct) / 100 };
  });
  const priceTotal = rows.reduce((s, r) => s + r.gain, 0);
  const fxPct = parseNum(h.fxPctInput);
  const totalSaldo = state.portfolio.reduce((s, p) => s + parseNum(p.saldo), 0);
  const fxGain = (totalSaldo * fxPct) / 100;
  h.result = { rows, priceTotal, fxPct, fxGain, total: priceTotal + fxGain };
  h.status = "result";
  render();
}

function saveHistoryAction() {
  const h = state.hoje;
  if (!h.result) return;
  const entry = {
    id: uid(),
    date: new Date().toISOString(),
    rows: h.result.rows,
    fxPct: h.result.fxPct,
    fxGain: h.result.fxGain,
    priceTotal: h.result.priceTotal,
    total: h.result.total,
  };
  state.history = [...state.history, entry];
  persistHistory();

  if (h.updateSaldo) {
    state.portfolio = state.portfolio.map((p) => {
      const row = h.result.rows.find((r) => r.id === p.id);
      if (!row) return p;
      const newSaldo = row.saldo + row.gain + (row.saldo * h.result.fxPct) / 100;
      return { ...p, saldo: Math.round(newSaldo * 100) / 100 };
    });
    persistPortfolio();
  }
  h.status = "saved";
  render();
}

      </nav>

      <main class="main">
        ${state.tab === "hoje" ? renderHoje() : state.tab === "posicoes" ? renderPosicoes() : renderHistorico()}
      </main>
    </div>`;

  if (deferredInstallPrompt) {
    const btn = document.getElementById("install-btn");
    if (btn) btn.hidden = false;
  }
}

function handleAction(action, el) {
  const id = el.dataset.id;
  switch (action) {
    case "switch-tab": switchTab(el.dataset.tab); break;
    case "start-manual": startManual(); break;
    case "parse-pasted": parsePasted(); break;
    case "edit-review": state.hoje.status = "review"; render(); break;
    case "cancel-review": resetHojeState(); render(); break;
    case "compute": compute(); break;
    case "discard-result": resetHojeState(); render(); break;
    case "save-history": saveHistoryAction(); break;
    case "new-entry": resetHojeState(); render(); break;
    case "add-row": addRow(); break;
    case "remove-row": removeRow(id); break;
    case "save-positions": savePositions(); break;
    case "fetch-quotes": fetchQuotes(); break;
    case "add-demo": addDemo(); break;
    case "clear-history": clearHistoryAction(); break;
    case "remove-entry": removeEntryAction(id); break;
    case "install-app": installApp(); break;
  }
}

const root = document.getElementById("app");

root.addEventListener("click", (e) => {
  const el = e.target.closest("[data-action]");
  if (!el || el.disabled) return;
  handleAction(el.dataset.action, el);
});

root.addEventListener("input", (e) => {
  const el = e.target.closest("[data-bind]");
  if (!el) return;
  const bind = el.dataset.bind;
  const id = el.dataset.id;

  if (bind === "review") {
    state.hoje.reviewMap[id] = el.value;
  } else if (bind === "fx") {
    state.hoje.fxPctInput = el.value;
  } else if (bind === "paste") {
    state.hoje.pasteText = el.value;
    const btn = document.querySelector('[data-action="parse-pasted"]');
    if (btn) btn.disabled = !el.value.trim();
    if (state.hoje.error) {
      // clear stale error banner without a full re-render (keeps focus in the textarea)
      state.hoje.error = null;
      const banner = root.querySelector(".banner-warn");
      if (banner) banner.remove();
    }
  } else if (bind === "apiKey") {
    state.posicoes.apiKey = el.value;
    persistQuotesCache();
  } else if (bind === "fxRate") {
    state.posicoes.fxRateInput = el.value;
    persistQuotesCache();
    state.posicoes.rows.forEach((r) => updateRowValueCell(r.id));
    updateLiveTotal();
  } else if (["ticker", "broker", "quantity", "price", "saldo"].includes(bind)) {
    const row = state.posicoes.rows.find((r) => r.id === id);
    if (row) {
      row[bind] = el.value;
      state.posicoes.dirty = true;
      const saveBtn = document.querySelector('[data-action="save-positions"]');
      if (saveBtn) saveBtn.disabled = false;
      if (bind === "quantity" || bind === "price") {
        updateRowValueCell(id);
        updateLiveTotal();
      } else if (bind === "saldo") {
        updateLiveTotal();
      }
    }
  }
});

root.addEventListener("change", (e) => {
  const el = e.target.closest('[data-bind="updateSaldo"]');
  if (el) state.hoje.updateSaldo = el.checked;
});

/* ---------------------------------------------------------------------- */
/*  PWA: install prompt & service worker                                  */
/* ---------------------------------------------------------------------- */

let deferredInstallPrompt = null;

window.addEventListener("beforeinstallprompt", (e) => {
  e.preventDefault();
  deferredInstallPrompt = e;
  const btn = document.getElementById("install-btn");
  if (btn) btn.hidden = false;
});

function installApp() {
  if (!deferredInstallPrompt) return;
  deferredInstallPrompt.prompt();
  deferredInstallPrompt.userChoice.finally(() => {
    deferredInstallPrompt = null;
    const btn = document.getElementById("install-btn");
    if (btn) btn.hidden = true;
  });
}

window.addEventListener("appinstalled", () => {
  deferredInstallPrompt = null;
});

if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./service-worker.js").catch(() => {});
  });
}

/* ---------------------------------------------------------------------- */
/*  Init                                                                   */
/* ---------------------------------------------------------------------- */

loadState();
resetHojeState();
resetPosicoesState();
resetHistoricoState();
render();
</script>
</body>
</html>
