<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>P&amp;L Diario — Cartera Internacional</title>
<meta name="description" content="Sigue el resultado diario de tu cartera internacional: posiciones, variación del día e historial de P&amp;L.">
<meta name="theme-color" content="#0A0D10">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="P&amp;L Diario">
<link rel="manifest" href="./manifest.json">
<link rel="icon" href="./icons/icon-192.png">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<style>
@import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500;600&display=swap');

:root {
  --bg-app: #0A0D10;
  --bg-header-grad: #0F1318;
  --bg-card: #12161B;
  --bg-input: #0D1115;
  --bg-row-alt: #161A20;
  --border: #1C2128;
  --border-input: #232932;
  --text-primary: #ECEFF2;
  --text-secondary: #C7CCD3;
  --text-muted: #7A8290;
  --text-muted2: #ABB2BC;
  --text-dim: #4A5360;
  --accent-gold: #E8B339;
  --up: #1FD8A4;
  --down: #FF6B6B;
  --on-accent: #15130A;
}

[data-theme="light"] {
  --bg-app: #F7F8FA;
  --bg-header-grad: #FFFFFF;
  --bg-card: #FFFFFF;
  --bg-input: #F0F1F3;
  --bg-row-alt: #EEF0F3;
  --border: #E2E5E9;
  --border-input: #D5D9DE;
  --text-primary: #14181D;
  --text-secondary: #3A4250;
  --text-muted: #6B7280;
  --text-muted2: #4B5563;
  --text-dim: #9AA1AC;
  --accent-gold: #9A6B00;
  --up: #0F9D78;
  --down: #D92D2D;
  --on-accent: #FFFFFF;
}



* { box-sizing: border-box; }
html, body { margin: 0; padding: 0; background: var(--bg-app); }

.app {
  background: var(--bg-app);
  color: var(--text-primary);
  font-family: 'Inter', sans-serif;
  min-height: 100vh;
  padding-bottom: 32px;
}

.header { border-bottom: 1px solid var(--border); background: linear-gradient(180deg, var(--bg-header-grad) 0%, var(--bg-app) 100%); }
.header-top { display: flex; justify-content: space-between; align-items: flex-end; padding: 20px 18px 14px; gap: 12px; flex-wrap: wrap; }
.brand-eyebrow { font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.12em; color: var(--accent-gold); margin-bottom: 4px; }
.brand-title { font-family: 'Space Grotesk', sans-serif; font-size: 24px; font-weight: 700; margin: 0; letter-spacing: -0.01em; }
.header-right { display: flex; align-items: center; gap: 12px; }
.header-total { text-align: right; display: flex; flex-direction: column; }
.header-total-label { font-size: 11px; color: var(--text-muted); margin-bottom: 2px; }
.header-total-value { font-family: 'IBM Plex Mono', monospace; font-size: 20px; font-weight: 600; }
.header-total-change { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 12px; font-weight: 600; margin-top: 2px; }
.header-fx-rate { display: block; font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-top: 3px; opacity: .7; }

.install-pill { background: transparent; border: 1px solid var(--accent-gold); color: var(--accent-gold); font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600; padding: 7px 11px; border-radius: 20px; display: inline-flex; align-items: center; gap: 5px; cursor: pointer; white-space: nowrap; }
.install-pill[hidden] { display: none; }

.theme-toggle { background: transparent; border: 1px solid var(--border-input); color: var(--text-secondary); border-radius: 20px; padding: 7px; display: inline-flex; align-items: center; cursor: pointer; }
.theme-icon-dark { display: none; }
[data-theme="light"] .theme-icon-light { display: none; }
[data-theme="light"] .theme-icon-dark { display: inline-block; }

.header-total-toprow { display: flex; align-items: center; justify-content: flex-end; gap: 6px; }
.currency-toggle { background: transparent; border: 1px solid var(--border-input); color: var(--text-muted); font-size: 10px; padding: 2px 7px; border-radius: 10px; cursor: pointer; font-family: 'IBM Plex Mono', monospace; }

.tape { overflow: hidden; border-top: 1px solid var(--border); background: var(--bg-input); padding: 9px 0; }
.tape-track { display: flex; gap: 28px; white-space: nowrap; animation: scroll-tape 30s linear infinite; padding-left: 18px; width: max-content; }
@media (prefers-reduced-motion: reduce) { .tape-track { animation: none; } }
@keyframes scroll-tape { from { transform: translateX(0); } to { transform: translateX(-50%); } }
.tape-item { font-family: 'IBM Plex Mono', monospace; font-size: 12px; display: inline-flex; gap: 7px; align-items: center; color: var(--text-secondary); }
.tape-item b { color: var(--text-primary); font-weight: 600; }
.tape-price { color: var(--text-secondary); font-size: 11px; opacity: .75; }
.sync-status-row { display: flex; align-items: center; gap: 8px; margin-top: 8px; }

.tabbar { display: flex; gap: 4px; padding: 10px 14px 0; }
.tab { flex: 1; display: flex; align-items: center; justify-content: center; gap: 6px; background: transparent; border: none; color: var(--text-muted); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; padding: 10px 8px; border-radius: 8px 8px 0 0; cursor: pointer; border-bottom: 2px solid transparent; }
.tab-active { color: var(--text-primary); border-bottom: 2px solid var(--accent-gold); background: var(--bg-card); }

.main { padding: 16px 14px 0; max-width: 720px; margin: 0 auto; }
.stack { display: flex; flex-direction: column; gap: 14px; }

.card { background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 16px; }
.card-title-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.card-title { font-family: 'Space Grotesk', sans-serif; font-size: 15px; font-weight: 600; margin: 0; }

.upload-card, .center-card { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 10px; padding: 30px 16px; }
.upload-text { color: var(--text-muted2); font-size: 13px; max-width: 340px; line-height: 1.5; }
.upload-hint { color: var(--text-dim); font-size: 11px; max-width: 300px; line-height: 1.4; margin-top: -4px; }
.paste-area { width: 100%; max-width: 360px; min-height: 70px; background: var(--bg-input); border: 1px solid var(--border-input); color: var(--text-primary); font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; padding: 10px; border-radius: 8px; resize: vertical; }
.paste-area:focus { outline: none; border-color: var(--accent-gold); }
.divider-text { color: var(--text-dim); font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em; margin: 4px 0; }

.btn { font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 600; border-radius: 8px; padding: 10px 16px; display: inline-flex; align-items: center; gap: 7px; cursor: pointer; border: 1px solid transparent; background: none; }
.btn-primary { background: var(--accent-gold); color: var(--on-accent); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-ghost { background: transparent; color: var(--text-secondary); border: 1px solid var(--border-input); }
.btn-ghost:disabled { opacity: 0.4; cursor: not-allowed; }
.icon-btn { background: transparent; border: none; color: var(--text-muted); cursor: pointer; padding: 4px; display: inline-flex; }
.icon-btn:hover { color: var(--down); }
.move-cell { display: flex; flex-direction: column; gap: 2px; }
.move-btn { padding: 2px; }
.move-btn:hover { color: var(--accent-gold); }
.move-btn:disabled { opacity: 0.25; cursor: default; }
.move-btn:disabled:hover { color: var(--text-muted); }

.row-actions { display: flex; justify-content: flex-end; gap: 8px; margin-top: 14px; flex-wrap: wrap; }
.toolbar-row { display: flex; justify-content: flex-end; gap: 8px; flex-wrap: wrap; }
.period-pills { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; }
.period-pill { flex-shrink: 0; background: transparent; border: 1px solid var(--border-input); color: var(--text-muted); font-size: 12px; font-family: 'Inter', sans-serif; font-weight: 500; padding: 6px 12px; border-radius: 20px; cursor: pointer; white-space: nowrap; }
.period-pill.active { background: var(--accent-gold); color: var(--on-accent); border-color: var(--accent-gold); font-weight: 600; }
.btn-sm { padding: 6px 11px; font-size: 11.5px; }

.table { min-width: 100%; border-collapse: collapse; font-size: 13px; }
.table-scroll { overflow-x: auto; max-width: 100%; }
.table th { text-align: left; color: var(--text-muted); font-weight: 500; font-size: 11px; letter-spacing: 0.04em; text-transform: uppercase; padding: 6px 6px; border-bottom: 1px solid var(--border); }
.table td { padding: 9px 6px; border-bottom: 1px solid var(--bg-row-alt); font-family: 'IBM Plex Mono', monospace; }
.table td:first-child { font-family: 'Inter', sans-serif; }
.table .num { text-align: right; }
.row-fx td { background: var(--bg-header-grad); }

.up { color: var(--up); }
.down { color: var(--down); }
.muted { color: var(--text-muted); }
.small { font-size: 11.5px; }

.input-cell { width: 100%; background: var(--bg-input); border: 1px solid var(--border-input); color: var(--text-primary); font-family: 'IBM Plex Mono', monospace; font-size: 13px; padding: 6px 8px; border-radius: 6px; text-align: right; }
.input-cell:focus { outline: none; border-color: var(--accent-gold); }
.table-editable td:first-child .input-cell, .table-editable td:nth-child(2) .input-cell { text-align: left; }

.summary { margin-top: 14px; border-top: 1px solid var(--border); padding-top: 10px; display: flex; flex-direction: column; gap: 7px; }
.summary-line { display: flex; justify-content: space-between; font-size: 13px; font-family: 'IBM Plex Mono', monospace; }
.summary-total { font-size: 15px; font-weight: 700; border-top: 1px solid var(--border); padding-top: 8px; margin-top: 2px; font-family: 'Space Grotesk', sans-serif; }

.checkbox-row { display: flex; align-items: center; gap: 8px; font-size: 12.5px; color: var(--text-muted2); margin-top: 12px; cursor: pointer; }

.banner { display: flex; gap: 8px; align-items: flex-start; font-size: 12.5px; padding: 10px 12px; border-radius: 8px; margin-bottom: 12px; }
.banner-warn { background: rgba(232, 179, 57, 0.1); color: var(--accent-gold); border: 1px solid rgba(232, 179, 57, 0.25); }
.banner-ok { background: rgba(31, 216, 164, 0.1); color: var(--up); border: 1px solid rgba(31, 216, 164, 0.25); }
.error-list { margin: 0; padding-left: 18px; }
.error-list li { margin-bottom: 4px; }
.error-list li:last-child { margin-bottom: 0; }

.empty-state { text-align: center; color: var(--text-muted); padding: 30px 16px; }
.total-return-card { display: flex; flex-direction: column; gap: 4px; padding: 14px 16px; }
.total-return-value { font-family: 'Space Grotesk', sans-serif; font-size: 20px; font-weight: 700; }
.breakdown-subtitle { margin: 14px 0 8px; }
.breakdown-subtitle:first-of-type { margin-top: 0; }
.breakdown-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.breakdown-label { width: 64px; flex-shrink: 0; font-size: 12px; font-family: 'IBM Plex Mono', monospace; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.breakdown-bar-track { flex: 1; height: 8px; background: var(--border); border-radius: 4px; overflow: hidden; }
.breakdown-bar-fill { height: 100%; border-radius: 4px; }
.breakdown-pct { width: 44px; flex-shrink: 0; text-align: right; font-size: 12px; font-family: 'IBM Plex Mono', monospace; color: var(--text-muted2); }
.tx-form { margin-top: 16px; padding-top: 14px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 8px; }
.tx-select { width: 100%; text-align: left; }
.tx-form-row { display: flex; gap: 8px; }
.tx-form-row .input-cell { flex: 1; min-width: 0; }
.tx-date { width: 100%; color-scheme: dark; }
[data-theme="light"] .tx-date { color-scheme: light; }
.import-date-row .tx-ticker-wrap { display: flex; flex-direction: column; gap: 4px; }
.import-range-card { padding-bottom: 14px; }
.tx-ticker-wrap { position: relative; flex: 1; min-width: 0; }
.ticker-search-results { position: absolute; top: 100%; left: 0; right: 0; z-index: 20; background: var(--bg-card); border: 1px solid var(--border-input); border-radius: 8px; margin-top: 4px; overflow: hidden; max-height: 220px; overflow-y: auto; }
.ticker-search-item { display: flex; flex-direction: column; gap: 1px; width: 100%; text-align: left; background: transparent; border: none; border-bottom: 1px solid var(--border); color: var(--text-primary); padding: 8px 10px; font-family: 'IBM Plex Mono', monospace; font-size: 12.5px; cursor: pointer; }
.ticker-search-item:last-child { border-bottom: none; }
.ticker-search-item:hover, .ticker-search-item:active { background: var(--bg-input); }

.icon { display: inline-block; vertical-align: middle; flex-shrink: 0; }

.avatar-img { border-radius: 50%; object-fit: cover; vertical-align: middle; flex-shrink: 0; background: #fff; }
.avatar-fallback { display: inline-flex; align-items: center; justify-content: center; border-radius: 50%; color: var(--bg-app); font-weight: 700; font-family: 'Space Grotesk', sans-serif; vertical-align: middle; flex-shrink: 0; }
.ticker-cell { display: flex; align-items: center; gap: 8px; }
.ticker-cell .avatar-img, .ticker-cell .avatar-fallback { flex-shrink: 0; }
.ticker-cell input.input-cell { width: 64px; flex: 1 1 64px; min-width: 50px; }

.quotes-bar { display: flex; align-items: flex-end; justify-content: space-between; gap: 10px; flex-wrap: wrap; margin-bottom: 4px; }
.quotes-fx { display: flex; flex-direction: column; gap: 4px; min-width: 110px; }
.input-fx { text-align: left; }
.quotes-updated { margin: 6px 0 12px; }
.api-key-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
.input-apikey { flex: 1; min-width: 160px; text-align: left; }
.computed-value { color: var(--up); font-family: 'IBM Plex Mono', monospace; }

.spin { animation: spin 1s linear infinite; }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

.chart-wrap { width: 100%; overflow: hidden; }
.chart-svg { display: block; }
.chart-svg text { font-family: 'IBM Plex Mono', monospace; fill: var(--text-muted2); font-size: 12px; }
.chart-svg .chart-grid-line { stroke: var(--border); stroke-width: 1; stroke-dasharray: 2.5 4; }
.chart-svg .chart-zero-line { stroke: var(--text-dim); stroke-width: 1; }
.chart-svg .chart-axis-label { fill: var(--text-dim); font-size: 10.5px; }
.chart-svg .chart-line-up { stroke: var(--up); }
.chart-svg .chart-line-down { stroke: var(--down); }
.chart-svg .chart-dot-ring { fill: var(--bg-card); }
.chart-svg .chart-dot-up { fill: var(--up); }
.chart-svg .chart-dot-down { fill: var(--down); }
.chart-svg .chart-bar-up { fill: var(--up); }
.chart-svg .chart-bar-down { fill: var(--down); }
.chart-svg .chart-line-draw {
  stroke-dasharray: 1400;
  stroke-dashoffset: 1400;
  animation: chart-draw 1000ms cubic-bezier(.2, .7, .3, 1) forwards;
}
.chart-svg .chart-fade-in { opacity: 0; animation: chart-fade 500ms ease-out 200ms forwards; }
@keyframes chart-draw { to { stroke-dashoffset: 0; } }
@keyframes chart-fade { to { opacity: 1; } }
@media (prefers-reduced-motion: reduce) {
  .chart-svg .chart-line-draw { animation: none; stroke-dashoffset: 0; }
  .chart-svg .chart-fade-in { animation: none; opacity: 1; }
}

button:focus-visible, input:focus-visible, textarea:focus-visible {
  outline: 2px solid var(--accent-gold);
  outline-offset: 2px;
}

@media (max-width: 480px) {
  .header-top { flex-direction: column; align-items: flex-start; }
  .header-right { width: 100%; justify-content: space-between; }
  .header-total { text-align: right; }
}
</style>
</head>
<body>
<div id="app"></div>

<script>
/* ---------------------------------------------------------------------- */
/*  Constants & helpers                                                   */
/* ---------------------------------------------------------------------- */

const DEFAULT_PORTFOLIO = [
  { id: "pg-etrade", ticker: "PG", broker: "E*TRADE", quantity: 80.96, saldo: 58007.2 },
  { id: "ko-ms", ticker: "KO", broker: "Morgan Stanley", quantity: 97.32, saldo: 39919.13 },
  { id: "wmb-nomad", ticker: "WMB", broker: "Nomad", quantity: 32.23, saldo: 12626.73 },
  { id: "usb-nomad", ticker: "USB", broker: "Nomad", quantity: 31.28, saldo: 8574.66 },
  { id: "tm-nomad", ticker: "TM", broker: "Nomad", quantity: 7.36, saldo: 7029.68 },
  { id: "arkb-nomad", ticker: "ARKB", broker: "Nomad", quantity: 39.43, saldo: 5107.62 },
  { id: "arcc-nomad", ticker: "ARCC", broker: "Nomad", quantity: 21.8, saldo: 2050.72 },
  { id: "pg-nomad", ticker: "PG", broker: "Nomad", quantity: 0.89, saldo: 639.55 },
  { id: "sgov-nomad", ticker: "SGOV", broker: "Nomad", quantity: 1.0, saldo: 505.93 },
];

const parseNum = (v) => {
  if (typeof v === "number") return v;
  const n = parseFloat(String(v ?? "").trim().replace(",", "."));
  return Number.isFinite(n) ? n : 0;
};

const fmtBRL = (v) => (v ?? 0).toLocaleString("es", { style: "currency", currency: "BRL" });
const fmtUSD = (v) => (v ?? 0).toLocaleString("es", { style: "currency", currency: "USD" });

const fmtPct = (v) => `${v >= 0 ? "+" : ""}${(v ?? 0).toLocaleString("es", { minimumFractionDigits: 2, maximumFractionDigits: 2 })}%`;

const fmtShortDate = (iso) => {
  const d = new Date(iso);
  return d.toLocaleDateString("es", { day: "2-digit", month: "2-digit" });
};

const fmtFullDate = (iso) => {
  const d = new Date(iso);
  return `${d.toLocaleDateString("es")} · ${d.toLocaleTimeString("es", { hour: "2-digit", minute: "2-digit" })}`;
};

const uid = () => `row-${Date.now()}-${Math.floor(Math.random() * 10000)}`;

const isWeekend = () => {
  const day = new Date().getDay();
  return day === 0 || day === 6;
};

// NYSE/Nasdaq full-closure holidays. Source: NYSE Group official holiday calendar
// announcements (2025-2027). Needs a manual update once 2028 dates are published.
const US_MARKET_HOLIDAYS = new Set([
  "2025-01-01", "2025-01-20", "2025-02-17", "2025-04-18", "2025-05-26",
  "2025-06-19", "2025-07-04", "2025-09-01", "2025-11-27", "2025-12-25",
  "2026-01-01", "2026-01-19", "2026-02-16", "2026-04-03", "2026-05-25",
  "2026-06-19", "2026-07-03", "2026-09-07", "2026-11-26", "2026-12-25",
  "2027-01-01", "2027-01-18", "2027-02-15", "2027-03-26", "2027-05-31",
  "2027-06-18", "2027-07-05", "2027-09-06", "2027-11-25", "2027-12-24",
]);

const todayYMD = () => {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, "0")}-${String(d.getDate()).padStart(2, "0")}`;
};

const isHolidayToday = () => US_MARKET_HOLIDAYS.has(todayYMD());
const isMarketClosedToday = () => isWeekend() || isHolidayToday();
const marketClosedReason = () => (isWeekend() ? "es fin de semana" : "es feriado bursátil en EE. UU.");

// Same checks but for an arbitrary 'YYYY-MM-DD' date (used when filtering imported history,
// not just "today") — guards against data sources that occasionally stamp a value on a
// weekend (e.g. FX feeds spanning into Sat/Sun) even though the US stock market was closed.
const isNonTradingDay = (ymd) => {
  const d = new Date(`${ymd}T12:00:00`);
  const day = d.getDay();
  return day === 0 || day === 6 || US_MARKET_HOLIDAYS.has(ymd);
};

// Hora de Brasil (America/Sao_Paulo), calculada con Intl para que sea correcta sin importar
// la zona horaria del dispositivo del usuario. Se usa para el guardado automático del
// resultado diario después de las 20:00 y para decidir qué entrada del historial es "hoy".
const dateToBrazilYMD = (iso) => {
  const parts = new Intl.DateTimeFormat("en-CA", {
    timeZone: "America/Sao_Paulo",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
  }).formatToParts(new Date(iso));
  const map = {};
  parts.forEach((p) => (map[p.type] = p.value));
  return `${map.year}-${map.month}-${map.day}`;
};

const brazilTodayYMD = () => dateToBrazilYMD(new Date().toISOString());

const brazilHourMinute = () => {
  const parts = new Intl.DateTimeFormat("en-US", {
    timeZone: "America/Sao_Paulo",
    hour: "2-digit",
    minute: "2-digit",
    hour12: false,
  }).formatToParts(new Date());
  const map = {};
  parts.forEach((p) => (map[p.type] = p.value));
  let hour = parseInt(map.hour, 10);
  if (hour === 24) hour = 0; // algunas implementaciones de Intl devuelven "24" para la medianoche
  return { hour, minute: parseInt(map.minute, 10) };
};

const AUTO_SAVE_HOUR_BRAZIL = 20; // 8 PM hora de Brasil
const isPastAutoSaveTime = () => brazilHourMinute().hour >= AUTO_SAVE_HOUR_BRAZIL;

const escapeHtml = (s) => String(s ?? "").replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
const escapeAttr = (s) => escapeHtml(s).replace(/"/g, "&quot;");

const DEMO_VOLATILITY = {
  PG: [-1.5, 3.5],
  KO: [-1, 3],
  WMB: [-2.5, 2.5],
  USB: [-1, 2.5],
  TM: [-2, 1.5],
  ARCC: [-1, 1.5],
  ARKB: [-5, 5],
  SGOV: [-0.05, 0.08],
};
const DEMO_FX_RANGE = [-1, 2];

const randIn = ([min, max]) => min + Math.random() * (max - min);

const generateDemoEntries = (portfolio, days = 14) => {
  const totalSaldo = portfolio.reduce((s, p) => s + parseNum(p.saldo), 0);
  const entries = [];
  let cursor = new Date();
  while (entries.length < days) {
    cursor = new Date(cursor.getTime() - 86400000);
    const dow = cursor.getDay();
    if (dow === 0 || dow === 6) continue; // pula fins de semana
    const fxPct = randIn(DEMO_FX_RANGE);
    const rows = portfolio.map((p) => {
      const range = DEMO_VOLATILITY[p.ticker] || [-2, 2];
      const changePct = randIn(range);
      const saldo = parseNum(p.saldo);
      return { id: p.id, ticker: p.ticker, broker: p.broker, saldo, changePct, gain: (saldo * changePct) / 100 };
    });
    const priceTotal = rows.reduce((s, r) => s + r.gain, 0);
    const fxGain = (totalSaldo * fxPct) / 100;
    entries.push({
      id: `demo-${cursor.getTime()}`,
      date: cursor.toISOString(),
      rows,
      fxPct,
      fxGain,
      priceTotal,
      total: priceTotal + fxGain,
    });
  }
  return entries.reverse();
};

const AVATAR_PALETTE = ["#E8B339", "#1FD8A4", "#5B8DEF", "#E8638C", "#A78BFA", "#F2994A", "#4FC3D9", "#9CCC65"];

function avatarColor(ticker) {
  let hash = 0;
  for (let i = 0; i < ticker.length; i++) hash = (hash * 31 + ticker.charCodeAt(i)) | 0;
  return AVATAR_PALETTE[Math.abs(hash) % AVATAR_PALETTE.length];
}

function avatarHtml(ticker, logoUrl, size = 22) {
  const initial = escapeHtml((ticker || "?").slice(0, 1).toUpperCase());
  const color = avatarColor(ticker || "?");
  const fallback = `<span class="avatar-fallback" style="width:${size}px;height:${size}px;font-size:${Math.round(size * 0.55)}px;background:${color};${logoUrl ? "display:none" : ""}">${initial}</span>`;
  if (!logoUrl) return fallback;
  const safeUrl = escapeAttr(logoUrl);
  // No HTML is embedded inside the onerror attribute (that caused quote-escaping bugs) —
  // it just toggles visibility of the always-present fallback span right next to it.
  const img = `<img class="avatar-img" src="${safeUrl}" width="${size}" height="${size}" alt="" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='inline-flex'">`;
  return img + fallback;
}

// Recalcula el precio promedio de compra de un ticker a partir de TODAS sus transacciones
// guardadas (compras/ventas), en orden cronológico, con el método de costo promedio.
// Calcula dos versiones del costo:
//  - avgCostUsd: el promedio en dólares (lo que ya mostraba la app).
//  - avgCostBrl: el promedio en reales usando el cambio USD/BRL del día de CADA compra
//    (no el cambio de hoy). Esto es lo que estaba faltando: la ganancia/pérdida no realizada
//    en reales solo es correcta si el costo también se calcula con el cambio histórico de
//    cuando se compró, no con el cambio actual aplicado a todo (ver "Buscar cambios
//    históricos" en la tarjeta de ganancia/pérdida no realizada). Si falta el cambio
//    histórico de alguna compra de ese ticker, avgCostBrl queda en null (la app entonces usa
//    el cambio actual como aproximación, igual que antes, en vez de mezclar datos parciales).
function recomputeCostBasisFromTransactions(ticker) {
  const txs = state.transactions
    .filter((t) => t.ticker === ticker)
    .slice()
    .sort((a, b) => new Date(a.date) - new Date(b.date));
  let qty = 0;
  let costUsd = 0;
  let costBrl = 0;
  let missingFx = false;
  txs.forEach((t) => {
    if (t.type === "buy") {
      qty += t.qty;
      costUsd += t.qty * t.price;
      if (typeof t.fx === "number" && t.fx > 0) {
        costBrl += t.qty * t.price * t.fx;
      } else {
        missingFx = true;
      }
    } else if (t.type === "sell") {
      if (qty > 0) {
        const avgUsd = costUsd / qty;
        costUsd -= avgUsd * t.qty;
        const avgBrl = costBrl / qty;
        costBrl -= avgBrl * t.qty;
      }
      qty -= t.qty;
    }
  });
  return {
    avgCostUsd: qty > 0.0001 ? costUsd / qty : null,
    avgCostBrl: qty > 0.0001 && !missingFx ? costBrl / qty : null,
  };
}

// Aplica un precio promedio recalculado (USD y, si está disponible, BRL) a las posiciones de
// un ticker. El CSV no distingue corretora — cuando hay UNA sola posición para ese ticker no
// hay ambigüedad. Pero cuando el mismo ticker está repartido en varias corretoras (p. ej. PG en
// E*TRADE y en Nomad, cada una con su propio costo real), aplicar el mismo promedio combinado a
// TODAS las filas es incorrecto para las posiciones chicas que probablemente no están
// representadas en este historial de transacciones. En ese caso, el promedio recalculado se
// aplica solo a la posición DOMINANTE (la que tiene más cantidad, y por lo tanto concentra casi
// toda la actividad reflejada en las transacciones), dejando las demás posiciones del mismo
// ticker sin tocar en vez de "contaminarlas" con un número que probablemente no les corresponde.
function applyAvgCostToTickerRows(sym, avgCostUsd, avgCostBrl) {
  const rowsForTicker = state.portfolio.filter((r) => r.ticker === sym);
  const targetId = rowsForTicker.length <= 1 ? null : rowsForTicker.reduce((a, b) => (parseNum(b.quantity) > parseNum(a.quantity) ? b : a)).id;
  state.portfolio = state.portfolio.map((row) => {
    if (row.ticker !== sym) return row;
    if (targetId !== null && row.id !== targetId) return row; // posición chica de otra corretora: no se toca
    return { ...row, avgCost: avgCostUsd, avgCostBrl };
  });
  if (state.posicoes) {
    state.posicoes.rows = state.posicoes.rows.map((row) => {
      if (row.ticker !== sym) return row;
      if (targetId !== null && row.id !== targetId) return row;
      return { ...row, avgCost: avgCostUsd, avgCostBrl };
    });
  }
}

// Aplica un desdoblamiento (split) de acciones a un ticker: ajusta retroactivamente todas las
// transacciones registradas ANTES de la fecha del split (qty × proporción, precio ÷ proporción)
// para que queden en la misma escala que las acciones actuales (post-split), y recalcula el
// precio promedio de compra. Funciona también para desdoblamientos inversos con proporción < 1.
function applyStockSplit(ticker, dateStr, ratio) {
  const cutoff = new Date(`${dateStr}T00:00:00`).getTime();
  let adjustedCount = 0;
  state.transactions = state.transactions.map((t) => {
    if (t.ticker !== ticker) return t;
    if (new Date(t.date).getTime() >= cutoff) return t; // ya están en la escala post-split
    adjustedCount++;
    return { ...t, qty: t.qty * ratio, price: t.price / ratio };
  });
  persistTransactions();

  const { avgCostUsd, avgCostBrl } = recomputeCostBasisFromTransactions(ticker);
  applyAvgCostToTickerRows(ticker, avgCostUsd, avgCostBrl);
  persistPortfolio();

  state.splits = [...state.splits, { id: uid(), ticker, date: dateStr, ratio, appliedAt: new Date().toISOString(), adjustedCount }];
  persistSplits();
  return adjustedCount;
}

// Revierte un desdoblamiento previamente aplicado (operación inversa) y lo quita de la lista.
function removeStockSplit(id) {
  const split = state.splits.find((s) => s.id === id);
  if (!split) return;
  const cutoff = new Date(`${split.date}T00:00:00`).getTime();
  state.transactions = state.transactions.map((t) => {
    if (t.ticker !== split.ticker) return t;
    if (new Date(t.date).getTime() >= cutoff) return t;
    return { ...t, qty: t.qty / split.ratio, price: t.price * split.ratio };
  });
  persistTransactions();

  const { avgCostUsd, avgCostBrl } = recomputeCostBasisFromTransactions(split.ticker);
  applyAvgCostToTickerRows(split.ticker, avgCostUsd, avgCostBrl);
  persistPortfolio();

  state.splits = state.splits.filter((s) => s.id !== id);
  persistSplits();
}

// Ajusta una cantidad/precio CRUDO (tal como viene en un CSV recién importado) aplicando todos
// los desdoblamientos YA REGISTRADOS para ese ticker que correspondan a esa fecha. Así, al
// reimportar un CSV después de haber aplicado un split, la fila recién leída queda en la MISMA
// escala que la transacción ya guardada (y el control de duplicados la reconoce correctamente
// en vez de agregarla de nuevo sin ajustar, mezclando datos de dos escalas distintas).
function applySplitsToRawValue(ticker, dateIso, qty, price) {
  let q = qty;
  let pr = price;
  state.splits.forEach((s) => {
    if (s.ticker !== ticker) return;
    const cutoff = new Date(`${s.date}T00:00:00`).getTime();
    if (new Date(dateIso).getTime() < cutoff) {
      q *= s.ratio;
      pr /= s.ratio;
    }
  });
  return { qty: q, price: pr };
}

// Limpia transacciones duplicadas que hayan quedado de reimportar un CSV ANTES de que existiera
// el ajuste anterior: misma fecha, mismo tipo, mismo ticker, pero una en escala "cruda" (sin
// ajustar por el split) y otra ya ajustada. Se detecta por la relación exacta del split
// (qty_ajustada = qty_cruda × proporción, precio_ajustado = precio_crudo ÷ proporción) y se
// elimina la versión cruda, dejando solo la correcta.
function dedupeSplitDuplicateTransactions() {
  let removed = 0;
  const toRemove = new Set();
  state.splits.forEach((s) => {
    const cutoff = new Date(`${s.date}T00:00:00`).getTime();
    const candidates = state.transactions.filter((t) => t.ticker === s.ticker && new Date(t.date).getTime() < cutoff);
    const byDateType = {};
    candidates.forEach((t) => {
      const key = `${String(t.date).slice(0, 10)}|${t.type}`;
      (byDateType[key] = byDateType[key] || []).push(t);
    });
    Object.values(byDateType).forEach((group) => {
      if (group.length < 2) return;
      for (let i = 0; i < group.length; i++) {
        for (let j = 0; j < group.length; j++) {
          if (i === j) continue;
          const raw = group[i];
          const adjusted = group[j];
          if (toRemove.has(raw.id) || toRemove.has(adjusted.id)) continue;
          if (!raw.qty || !adjusted.price) continue;
          const ratioQty = adjusted.qty / raw.qty;
          const ratioPrice = raw.price / adjusted.price;
          if (Math.abs(ratioQty - s.ratio) < 0.0005 && Math.abs(ratioPrice - s.ratio) < 0.0005) {
            toRemove.add(raw.id); // "raw" es la versión sin ajustar de la misma operación: se elimina
          }
        }
      }
    });
  });
  if (toRemove.size) {
    state.transactions = state.transactions.filter((t) => !toRemove.has(t.id));
    removed = toRemove.size;
    persistTransactions();
  }
  return removed;
}

function resetHojeState() {
  // Precargamos priceByTicker desde las cotizaciones ya cacheadas (de una sesión anterior o
  // de una actualización de precios en la pestaña "Posiciones") para que el precio de cada
  // activo aparezca en la tabla de variación INMEDIATAMENTE al abrir la app, sin tener que
  // tocar "Actualizar variación" primero.
  const cachedQuotes = state.posicoes?.quotes || loadQuotesCache().quotes;
  const priceByTickerFromCache = {};
  Object.entries(cachedQuotes).forEach(([sym, price]) => {
    if (typeof price === "number" && price > 0) priceByTickerFromCache[sym] = { price, prevClose: null };
  });

  // Si hoy (según la hora de Brasil) ya tiene un registro en el historial — guardado
  // automáticamente después de las 20:00 — se muestra esa información directamente en vez de
  // la pantalla "idle". Así la variación por activo se mantiene visible siempre, incluso al
  // cambiar de pestaña o recargar la app, y solo cambia cuando se vuelve a tocar
  // "Buscar variación automáticamente" / "Actualizar variación" (eso solo refresca la vista,
  // nunca guarda en el historial: el historial solo lo actualiza el proceso automático).
  const todayEntry = state.history.find((e) => dateToBrazilYMD(e.date) === brazilTodayYMD());
  if (todayEntry) {
    const reviewMap = {};
    todayEntry.rows.forEach((r) => { reviewMap[r.id] = String(r.changePct); });
    state.hoje = {
      status: "saved",
      error: null,
      reviewMap,
      fxPctInput: String(todayEntry.fxPct),
      result: {
        rows: todayEntry.rows,
        priceTotal: todayEntry.priceTotal,
        fxPct: todayEntry.fxPct,
        fxGain: todayEntry.fxGain,
        total: todayEntry.total,
      },
      pasteText: "",
      fetchStatus: "idle",
      fetchProgressLabel: null,
      savedAt: todayEntry.date,
      priceByTicker: priceByTickerFromCache,
    };
    return;
  }

  state.hoje = {
    status: "idle",
    error: null,
    reviewMap: {},
    fxPctInput: "0",
    result: null,
    pasteText: "",
    fetchStatus: "idle",
    fetchProgressLabel: null,
    savedAt: null,
    priceByTicker: priceByTickerFromCache,
  };
}
function loadQuotesCache() {

  try { apiKey = localStorage.getItem("pnl-twelvedata-key") || ""; } catch (_) {}
  try { finnhubKey = localStorage.getItem("pnl-finnhub-key") || ""; } catch (_) {}

  try { logos = JSON.parse(localStorage.getItem("pnl-logos") || "{}"); } catch (_) {}

}

function persistQuotesCache() {

function persistDividends() {
  // Los dividendos viven dentro de state.transactions (type: "dividend"), así que se
  // persisten con la misma función que compras/ventas — esto es solo un alias semántico
  // usado en los lugares donde el código se refiere específicamente a dividendos.
  persistTransactions();
}

function resetPosicoesState() {
  const cache = loadQuotesCache();
  const fx = parseNum(cache.fxRateInput);
  const weightOf = (p) => {
    const price = typeof p.price === "number" || typeof p.price === "string" ? parseNum(p.price) : parseNum(cache.quotes[p.ticker] ?? "");
    if (fx && price) return parseNum(p.quantity) * price * fx;
    return parseNum(p.saldo) || 0;
  };
  const rows = state.portfolio
    .map((p) => ({ ...p, price: typeof p.price === "number" || typeof p.price === "string" ? p.price : (cache.quotes[p.ticker] ?? "") }))
    .sort((a, b) => weightOf(b) - weightOf(a)); // descending: biggest position first — only on first load of the tab, after that manual ↑↓ takes over

  // ARKB (ARK 21Shares Bitcoin ETF) hizo un desdoblamiento real de 3-por-1 el 16/06/2025.
  // Si el usuario tiene ARKB en la cartera y todavía no aplicó ese split, se precarga el
  // formulario con esos datos para que sea un solo toque corregir el costo promedio.
  const hasArkbAlready = state.splits.some((s) => s.ticker === "ARKB");
  const hasArkbPosition = state.portfolio.some((p) => p.ticker === "ARKB");
  const splitFormDefaults =
    !hasArkbAlready && hasArkbPosition
      ? { ticker: "ARKB", date: "2025-06-16", ratio: "3" }
      : { ticker: "", date: todayYMD(), ratio: "" };

  state.posicoes = {
    rows,
    dirty: false,
    apiKey: cache.apiKey,
    finnhubKey: cache.finnhubKey,
    quotes: cache.quotes,
    logos: cache.logos,
    fxRateInput: cache.fxRateInput,
    quotesUpdatedAt: cache.quotesUpdatedAt,
    quotesStatus: "idle",
    quotesProgressLabel: null,
    quotesError: null,
    importPurchasesMessage: null,
    dividendTaxPct: cache.dividendTaxPct,
    dividendCheckStatus: "idle",
    dividendCheckError: null,
    missingDividends: [], // [{ ticker, date, perShare }] — pagos vistos en Finnhub que no están registrados
    dividendsExpanded: false,
    txForm: { rowId: rows[0]?.id || "__new__", newTicker: "", newBroker: "", type: "buy", qty: "", price: "", date: todayYMD(), error: null, tickerSearchResults: [], tickerSearchStatus: "idle" },
    splitForm: { ...splitFormDefaults, error: null },
    splitMessage: null,
    fxBackfillStatus: "idle",
    fxBackfillError: null,
    fxBackfillMessage: null,
  };
}

function rowComputedValue(r) {
  const fx = parseNum(state.posicoes.fxRateInput);
  const price = parseNum(r.price);
  const qty = parseNum(r.quantity);
  if (!fx || !price) return null;
  return qty * price * fx;
}

function timeAgoLabel(iso) {
  if (!iso) return "";
  const diffMs = Date.now() - new Date(iso).getTime();
  const mins = Math.round(diffMs / 60000);
  if (mins < 1) return "actualizado ahora";
  if (mins < 60) return `actualizado hace ${mins} min`;
  const hours = Math.round(mins / 60);
  if (hours < 24) return `actualizado hace ${hours}h`;
  return `actualizado el ${fmtShortDate(iso)}`;
}

async function fetchQuotes() {
  const p = state.posicoes;
  const finnhubKey = (p.finnhubKey || "").trim();
  const twelveKey = (p.apiKey || "").trim();
  if (!finnhubKey && !twelveKey) {
    p.quotesError = ["Ingresa al menos tu clave de Finnhub (para precios) o de Twelve Data (para el cambio)."];
    render();
    return;
  }
  p.quotesStatus = "loading";
  p.quotesError = null;
  p.quotesProgressLabel = "Buscando…";
  render();

  const tickers = [...new Set(state.portfolio.map((r) => r.ticker).filter(Boolean))];
  const errors = [];
  const newQuotes = { ...p.quotes };

  // 1) USD/BRL via Twelve Data — just 1 symbol, far under its 8-credits/min free limit.
  const fxPromise = (async () => {
    if (!twelveKey) { errors.push("Sin clave de Twelve Data: el cambio no se actualizó."); return; }
    try {
      const url = `https://api.twelvedata.com/price?symbol=USD/BRL&apikey=${encodeURIComponent(twelveKey)}`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (data && data.status === "error") { errors.push(data.message || "Error al buscar el cambio en Twelve Data."); return; }
      const num = parseFloat(data?.price);
      if (Number.isFinite(num)) p.fxRateInput = String(num);
      else errors.push("Sin cotización para USD/BRL.");
    } catch (err) {
      errors.push("No pude buscar el cambio en Twelve Data (sin conexión).");
    }
  })();

  // 2) Stock prices via Finnhub — free plan allows 60 calls/min, so all tickers fetch
  // concurrently in one go, no batching or waiting needed.
  const newLogos = { ...p.logos };
  const quotesPromise = (async () => {
    if (!finnhubKey) { if (tickers.length) errors.push("Sin clave de Finnhub: los precios no se actualizaron."); return; }
    await Promise.all(
      tickers.map(async (sym) => {
        try {
          const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${encodeURIComponent(finnhubKey)}`;
          const resp = await fetch(url);
          const data = await resp.json();
          const price = Number(data?.c);
          if (!Number.isFinite(price) || (price === 0 && Number(data?.pc) === 0)) {
            errors.push(`Sin cotización para ${sym}.`);
            return;
          }
          newQuotes[sym] = price;
        } catch (err) {
          errors.push(`No pude buscar ${sym} en Finnhub (sin conexión).`);
        }
        // Logo only needs fetching once per ticker ever — it doesn't change.
        if (!newLogos[sym]) {
          try {
            const logoUrl = `https://finnhub.io/api/v1/stock/profile2?symbol=${encodeURIComponent(sym)}&token=${encodeURIComponent(finnhubKey)}`;
            const logoResp = await fetch(logoUrl);
            const logoData = await logoResp.json();
            if (logoResp.ok && typeof logoData?.logo === "string" && logoData.logo) newLogos[sym] = logoData.logo;
          } catch (_) {
            // no logo, the colored-initial fallback will show instead — not worth surfacing as an error.
          }
        }
      })
    );
  })();

  await Promise.all([fxPromise, quotesPromise]);

  p.quotes = newQuotes;
  p.logos = newLogos;
  p.quotesUpdatedAt = new Date().toISOString();
  p.quotesError = errors.length ? errors : null;
  p.rows = p.rows.map((r) => ({ ...r, price: typeof newQuotes[r.ticker] === "number" ? newQuotes[r.ticker] : r.price }));
  p.dirty = true;
  // Sincronizamos también priceByTicker en state.hoje para que la tabla "Variación del día"
  // muestre el precio actualizado aunque el usuario no haya tocado "Actualizar variación".
  if (state.hoje) {
    const pb = { ...state.hoje.priceByTicker };
    Object.entries(newQuotes).forEach(([sym, price]) => {
      if (typeof price === "number" && price > 0) pb[sym] = { price, prevClose: pb[sym]?.prevClose ?? null };
    });
    state.hoje.priceByTicker = pb;
  }
  persistQuotesCache();

  p.quotesStatus = "idle";
  p.quotesProgressLabel = null;
  render();
}

// Busca en Twelve Data el cambio USD/BRL del día de cada compra/venta que todavía no lo
// tenga guardado, y lo asigna a esa transacción. Con eso se puede calcular el costo de cada
// compra en reales usando el cambio de ESE día (no el de hoy), que es la causa de que la
// ganancia/pérdida no realizada en reales no coincidiera con otras apps (como Kinvo).
async function backfillHistoricalFx() {
  const ps = state.posicoes;
  const twelveKey = (ps.apiKey || "").trim();
  const missing = state.transactions.filter((t) => t.type === "buy" && !(typeof t.fx === "number" && t.fx > 0));

  if (!missing.length) {
    ps.fxBackfillStatus = "idle";
    ps.fxBackfillError = null;
    ps.fxBackfillMessage = "Todas las compras ya tienen el cambio histórico guardado.";
    render();
    return;
  }
  if (!twelveKey) {
    ps.fxBackfillError = ["Configura tu clave de Twelve Data (arriba en esta pestaña) para poder buscar el cambio histórico."];
    render();
    return;
  }

  ps.fxBackfillStatus = "loading";
  ps.fxBackfillError = null;
  ps.fxBackfillMessage = null;
  render();

  const dates = missing.map((t) => String(t.date).slice(0, 10));
  const minDate = dates.reduce((a, b) => (a < b ? a : b));
  const maxDate = todayYMD();

  try {
    const url = `https://api.twelvedata.com/time_series?symbol=USD/BRL&interval=1day&start_date=${minDate}&end_date=${maxDate}&outputsize=5000&apikey=${encodeURIComponent(twelveKey)}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data && data.status === "error") throw new Error(data.message || "Error en Twelve Data");
    if (!Array.isArray(data?.values) || !data.values.length) throw new Error("Sin datos históricos del cambio USD/BRL para ese período.");

    const closesByDate = {};
    data.values.forEach((v) => {
      const d = String(v.datetime).slice(0, 10);
      const close = parseFloat(v.close);
      if (Number.isFinite(close)) closesByDate[d] = close;
    });
    const sortedDates = Object.keys(closesByDate).sort();
    // Si la compra fue un día sin cotización (fin de semana/feriado en el calendario de FX),
    // se usa el último día con cotización disponible antes de esa fecha.
    const nearestRate = (ymd) => {
      if (closesByDate[ymd] !== undefined) return closesByDate[ymd];
      let candidate = null;
      for (const d of sortedDates) {
        if (d <= ymd) candidate = d;
        else break;
      }
      return candidate !== null ? closesByDate[candidate] : null;
    };

    let filled = 0;
    const affectedTickers = new Set();
    state.transactions = state.transactions.map((t) => {
      if (t.type !== "buy" || (typeof t.fx === "number" && t.fx > 0)) return t;
      const ymd = String(t.date).slice(0, 10);
      const rate = nearestRate(ymd);
      if (rate === null) return t;
      filled++;
      affectedTickers.add(t.ticker);
      return { ...t, fx: rate };
    });
    persistTransactions();

    affectedTickers.forEach((ticker) => {
      const { avgCostUsd, avgCostBrl } = recomputeCostBasisFromTransactions(ticker);
      const rowsForTicker = state.portfolio.filter((p) => p.ticker === ticker);
      const targetId = rowsForTicker.length <= 1 ? null : rowsForTicker.reduce((a, b) => (parseNum(b.quantity) > parseNum(a.quantity) ? b : a)).id;
      state.portfolio = state.portfolio.map((p) => {
        if (p.ticker !== ticker) return p;
        if (targetId !== null && p.id !== targetId) return p;
        return { ...p, avgCost: avgCostUsd ?? p.avgCost, avgCostBrl };
      });
    });
    persistPortfolio();

    const pending = missing.length - filled;
    ps.fxBackfillMessage =
      `Se completó el cambio histórico de ${filled} de ${missing.length} compra(s).` +
      (pending ? ` ${pending} quedaron sin datos (fuera del rango disponible).` : "");
    ps.fxBackfillError = null;
  } catch (err) {
    ps.fxBackfillError = [err.message || "No pude buscar el cambio histórico (sin conexión)."];
  }

  resetPosicoesState();
  state.posicoes.fxBackfillStatus = "idle";
  if (ps.fxBackfillMessage) state.posicoes.fxBackfillMessage = ps.fxBackfillMessage;
  if (ps.fxBackfillError) state.posicoes.fxBackfillError = ps.fxBackfillError;
  render();
}

// Filtra state.history según el filtro de período activo en la pestaña Historial ("all",
// "month", "year", o un año puntual como "2023"). Se usa tanto para dibujar los gráficos como
// para que "Comparar con S&P 500"/"Comparar con CDI" comparen contra ESE mismo período en vez
// de siempre contra el historial completo.
function getPeriodFilteredHistory(periodFilter) {
  const sorted = [...state.history].sort((a, b) => new Date(a.date) - new Date(b.date));
  const currentYear = new Date().getFullYear();
  const currentMonthKey = todayYMD().slice(0, 7);
  return sorted.filter((h) => {
    if (periodFilter === "all") return true;
    if (periodFilter === "month") return String(h.date).slice(0, 7) === currentMonthKey;
    if (periodFilter === "year") return new Date(h.date).getFullYear() === currentYear;
    return String(new Date(h.date).getFullYear()) === periodFilter;
  });
}

function resetHistoricoState() {
  const earliestTx = state.transactions.length
    ? state.transactions.reduce((min, t) => (t.date < min ? t.date : min), state.transactions[0].date)
    : null;
  const defaultFrom = earliestTx ? earliestTx.slice(0, 10) : new Date(Date.now() - 14 * 86400000).toISOString().slice(0, 10);
  state.historico = {
    confirmClear: false,
    importStatus: "idle",
    importProgressLabel: null,
    importMessage: null,
    importError: null,
    editingId: null,
    editReviewMap: {},
    editFxInput: "0",
    spxStatus: "idle",
    spxPct: null,
    spxError: null,
    cdiStatus: "idle",
    cdiPct: null,
    cdiError: null,
    periodFilter: "all",
    importFromDate: defaultFrom,
    importToDate: todayYMD(),
    autoFillNotice: null,
    recordsExpanded: false,
    monthlyExpanded: false,
  };
}

async function compareSpx() {
  const hs = state.historico;
  const twelveKey = (state.posicoes.apiKey || "").trim();
  if (!twelveKey) {
    hs.spxError = "Configura tu clave de Twelve Data en la pestaña Posiciones primero.";
    render();
    return;
  }
  const periodFiltered = getPeriodFilteredHistory(hs.periodFilter);
  if (!periodFiltered.length) return;
  hs.spxStatus = "loading";
  hs.spxError = null;
  render();
  try {
    const start = periodFiltered[0].date.slice(0, 10);
    const end = periodFiltered[periodFiltered.length - 1].date.slice(0, 10);
    const url = `https://api.twelvedata.com/time_series?symbol=SPY&interval=1day&start_date=${start}&end_date=${end}&apikey=${encodeURIComponent(twelveKey)}`;
    const resp = await fetch(url);
    const data = await resp.json();
    if (data && data.status === "error") throw new Error(data.message || "Error en Twelve Data");
    if (!Array.isArray(data?.values) || data.values.length < 2) throw new Error("Sin suficientes datos del S&P 500 para ese período.");
    const byDate = [...data.values].sort((a, b) => new Date(a.datetime) - new Date(b.datetime));
    const first = parseFloat(byDate[0].close);
    const last = parseFloat(byDate[byDate.length - 1].close);
    if (!first) throw new Error("Dato inválido");
    hs.spxPct = ((last - first) / first) * 100;
  } catch (err) {
    hs.spxError = err.message || "No pude comparar con el S&P 500 (sin conexión).";
  }
  hs.spxStatus = "idle";
  render();
}

// MEJORA #4 — Comparación contra el CDI, vía la API gratuita y sin clave del Banco Central
// (serie 12 = CDI diario, % al día). Algunos navegadores pueden bloquear esta llamada por
// CORS si el Banco Central no autoriza el origen — en ese caso se avisa.
async function compareCdi() {
  const hs = state.historico;
  const periodFiltered = getPeriodFilteredHistory(hs.periodFilter);
  if (!periodFiltered.length) return;
  hs.cdiStatus = "loading";
  hs.cdiError = null;
  render();
  try {
    const toBcbDate = (ymd) => { const [y, m, d] = ymd.split("-"); return `${d}/${m}/${y}`; };
    const start = toBcbDate(periodFiltered[0].date.slice(0, 10));
    const end = toBcbDate(periodFiltered[periodFiltered.length - 1].date.slice(0, 10));
    const url = `https://api.bcb.gov.br/dados/serie/bcdata.sgs.12/dados?formato=json&dataInicial=${start}&dataFinal=${end}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error("No pude conectarme a la API del Banco Central.");
    const data = await resp.json();
    if (!Array.isArray(data) || !data.length) throw new Error("Sin datos del CDI para ese período.");
    let factor = 1;
    data.forEach((d) => {
      const v = parseFloat(String(d.valor).replace(",", "."));
      if (Number.isFinite(v)) factor *= 1 + v / 100;
    });
    hs.cdiPct = (factor - 1) * 100;
  } catch (err) {
    hs.cdiError = "No pude buscar el CDI automáticamente (puede ser un bloqueo de CORS del navegador a la API del Banco Central).";
  }
  hs.cdiStatus = "idle";
  render();
}

function startEditEntry(id) {
  const entry = state.history.find((h) => h.id === id);
  if (!entry) return;
  const map = {};
  entry.rows.forEach((r) => { map[r.id] = String(r.changePct); });
  state.historico.editingId = id;
  state.historico.editReviewMap = map;
  state.historico.editFxInput = String(entry.fxPct);
  render();
}

function cancelEditEntry() {
  state.historico.editingId = null;
  render();
}

function saveEntryEdit() {
  const hs = state.historico;
  const entry = state.history.find((h) => h.id === hs.editingId);
  if (!entry) return;
  const fxPct = parseNum(hs.editFxInput);
  const totalSaldoAtEntry = entry.rows.reduce((s, r) => s + parseNum(r.saldo), 0);
  entry.rows = entry.rows.map((r) => {
    const pct = parseNum(hs.editReviewMap[r.id]);
    return { ...r, changePct: pct, gain: (parseNum(r.saldo) * pct) / 100 };
  });
  entry.priceTotal = entry.rows.reduce((s, r) => s + r.gain, 0);
  entry.fxPct = fxPct;
  entry.fxGain = (totalSaldoAtEntry * fxPct) / 100;
  entry.total = entry.priceTotal + entry.fxGain;
  persistHistory();
  hs.editingId = null;
  render();
}

/* ---------------------------------------------------------------------- */
/*  Charts (lightweight inline SVG, no dependencies)                      */
/* ---------------------------------------------------------------------- */

function fmtK(v) {
  if (v === 0) return "0";
  const abs = Math.abs(v);
  if (abs < 1000) return v.toFixed(abs < 10 ? 1 : 0);
  return `${(v / 1000).toFixed(abs < 10000 ? 1 : 0)}k`;
}

// Calcula "ticks" redondos para el eje Y (estilo 0 / 5k / 10k en vez de 0 / 4.8k / 9.6k), igual
// que hacen las librerías de gráficos profesionales — se ve mucho más prolijo que dividir el
// rango real en N partes iguales sin redondear.
function niceAxisTicks(rawMin, rawMax, targetCount = 4) {
  const span = rawMax - rawMin || 1;
  const rawStep = span / targetCount;
  const mag = Math.pow(10, Math.floor(Math.log10(rawStep)));
  const norm = rawStep / mag;
  const step = (norm < 1.5 ? 1 : norm < 3 ? 2 : norm < 7 ? 5 : 10) * mag;
  const niceMin = Math.floor(rawMin / step) * step;
  const niceMax = Math.ceil(rawMax / step) * step;
  const ticks = [];
  for (let v = niceMin; v <= niceMax + step * 0.5; v += step) ticks.push(Math.round(v * 1000) / 1000);
  return { min: niceMin, max: niceMax === niceMin ? niceMin + step : niceMax, ticks };
}

// Curva suave (Catmull-Rom → Bézier) en vez de segmentos rectos entre puntos — el mismo efecto
// de "tensión" que usan Chart.js/D3 para que la línea se vea fluida en vez de quebrada.
function smoothPathD(points) {
  if (!points.length) return "";
  if (points.length === 1) return `M ${points[0].x} ${points[0].y}`;
  let d = `M ${points[0].x} ${points[0].y}`;
  for (let i = 0; i < points.length - 1; i++) {
    const p0 = points[i - 1] || points[i];
    const p1 = points[i];
    const p2 = points[i + 1];
    const p3 = points[i + 2] || p2;
    const c1x = p1.x + (p2.x - p0.x) / 6;
    const c1y = p1.y + (p2.y - p0.y) / 6;
    const c2x = p2.x - (p3.x - p1.x) / 6;
    const c2y = p2.y - (p3.y - p1.y) / 6;
    d += ` C ${c1x.toFixed(2)} ${c1y.toFixed(2)}, ${c2x.toFixed(2)} ${c2y.toFixed(2)}, ${p2.x.toFixed(2)} ${p2.y.toFixed(2)}`;
  }
  return d;
}

let chartIdCounter = 0;

function buildChart({ type, data, valueKey, labelKey, height = 180, maxLabels = 6 }) {
  const W = 340, H = height;
  const padT = 14, padB = 24;
  const values = data.map((d) => d[valueKey]);
  const rawMin = Math.min(0, ...values);
  const rawMax = Math.max(0, ...values);
  const { min, max, ticks } = niceAxisTicks(rawMin, rawMax, type === "bar" ? 3 : 4);

  const gridLabels = ticks.map(fmtK);
  // El margen izquierdo se calcula según la etiqueta más larga que realmente se va a mostrar
  // (p. ej. "-22.4k" necesita más espacio que "1.5k"), para que el signo "-" nunca quede
  // cortado contra el borde del SVG.
  const longestLabelChars = Math.max(...gridLabels.map((l) => l.length));
  const padL = Math.max(30, 12 + longestLabelChars * 7.2);

  // El margen derecho se calcula según el ancho de la última etiqueta del eje X (la que
  // siempre se muestra). Esa etiqueta está centrada ("text-anchor: middle") justo sobre el
  // borde derecho del área interior del gráfico, así que si el margen es un valor fijo chico,
  // la mitad derecha del texto queda fuera del viewBox y el navegador la recorta. Por eso se
  // calcula igual que el margen izquierdo, en base al ancho real del texto que se va a mostrar.
  const skip = Math.max(1, Math.ceil(data.length / maxLabels));
  const shownLabelLens = data.map((d, i) => (i % skip === 0 || i === data.length - 1 ? String(d[labelKey] ?? "").length : 0));
  const longestXLabelChars = Math.max(1, ...shownLabelLens);
  const padR = Math.max(10, (longestXLabelChars * 6.4) / 2 + 4);

  const innerW = W - padL - padR;
  const innerH = H - padT - padB;

  const xStep = data.length > 1 ? innerW / (data.length - 1) : 0;
  const xFor = (i) => (data.length > 1 ? padL + i * xStep : padL + innerW / 2);
  const yFor = (v) => padT + innerH - ((v - min) / (max - min)) * innerH;
  const zeroY = yFor(0);

  let gridLines = "";
  ticks.forEach((t) => {
    const gy = yFor(t);
    gridLines += `<line class="chart-grid-line" x1="${padL}" y1="${gy.toFixed(2)}" x2="${W - padR}" y2="${gy.toFixed(2)}"/>`;
    gridLines += `<text class="chart-axis-label" x="${padL - 7}" y="${(gy + 3).toFixed(2)}" text-anchor="end">${fmtK(t)}</text>`;
  });

  let xLabels = "";
  data.forEach((d, i) => {
    if (i % skip === 0 || i === data.length - 1) {
      xLabels += `<text class="chart-axis-label" x="${xFor(i).toFixed(2)}" y="${H - 4}" text-anchor="middle">${escapeHtml(d[labelKey])}</text>`;
    }
  });

  const fmtTooltip = (v) => Math.round(v).toLocaleString("es");
  const id = `c${++chartIdCounter}`;
  let defs = "";
  let body = "";

  if (type === "line") {
    const trendUp = data.length && data[data.length - 1][valueKey] >= 0;
    const colorClass = trendUp ? "up" : "down";
    const points = data.map((d, i) => ({ x: xFor(i), y: yFor(d[valueKey]) }));
    const lineD = smoothPathD(points);
    const baselineY = padT + innerH;
    const areaD = `${lineD} L ${points[points.length - 1].x.toFixed(2)} ${baselineY} L ${points[0].x.toFixed(2)} ${baselineY} Z`;

    defs += `<linearGradient id="grad-${id}" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="var(--${trendUp ? "up" : "down"})" stop-opacity="0.32"/>
      <stop offset="100%" stop-color="var(--${trendUp ? "up" : "down"})" stop-opacity="0"/>
    </linearGradient>`;

    body += `<path d="${areaD}" fill="url(#grad-${id})" class="chart-fade-in"/>`;
    if (min < 0 && max > 0) gridLines += `<line class="chart-zero-line" x1="${padL}" y1="${zeroY.toFixed(2)}" x2="${W - padR}" y2="${zeroY.toFixed(2)}"/>`;
    body += `<path d="${lineD}" fill="none" class="chart-line-${colorClass} chart-line-draw" stroke-width="2.25" stroke-linejoin="round" stroke-linecap="round"/>`;
    data.forEach((d, i) => {
      const isLast = i === data.length - 1;
      const r = isLast ? 3.6 : 2.1;
      if (isLast) body += `<circle cx="${points[i].x.toFixed(2)}" cy="${points[i].y.toFixed(2)}" r="${r + 2}" class="chart-dot-ring chart-fade-in"/>`;
      body += `<circle cx="${points[i].x.toFixed(2)}" cy="${points[i].y.toFixed(2)}" r="${r}" class="chart-dot-${colorClass} chart-fade-in"><title>${escapeHtml(String(d[labelKey]))}: ${fmtTooltip(d[valueKey])}</title></circle>`;
    });
  } else if (type === "bar") {
    const bw = Math.min(18, (innerW / data.length) * 0.6);
    data.forEach((d, i) => {
      const v = d[valueKey];
      const y = Math.min(yFor(v), zeroY);
      const h = Math.max(2, Math.abs(yFor(v) - zeroY));
      const x = xFor(i) - bw / 2;
      const colorClass = v >= 0 ? "up" : "down";
      body += `<rect x="${x.toFixed(2)}" y="${y.toFixed(2)}" width="${bw.toFixed(2)}" height="${h.toFixed(2)}" rx="3.5" class="chart-bar-${colorClass} chart-fade-in"><title>${escapeHtml(String(d[labelKey]))}: ${fmtTooltip(v)}</title></rect>`;
    });
    body += `<line class="chart-zero-line" x1="${padL}" y1="${zeroY.toFixed(2)}" x2="${W - padR}" y2="${zeroY.toFixed(2)}"/>`;
  }

  return `<svg class="chart-svg" viewBox="0 0 ${W} ${H}" preserveAspectRatio="none" width="100%" height="${H}" role="img" aria-label="Gráfico">${defs ? `<defs>${defs}</defs>` : ""}${gridLines}${body}${xLabels}</svg>`;
}

function renderTickerTape(portfolio, lastEntry) {
  const logos = state.posicoes?.logos || {};
  const priceByTicker = state.hoje?.priceByTicker || {};
  const quotes = state.posicoes?.quotes || {};
  const uniqueTickers = [...new Set(portfolio.map((p) => p.ticker))];
  const itemsByTicker = {};
  if (lastEntry) lastEntry.rows.forEach((r) => { itemsByTicker[r.ticker] = r.changePct; });
  const tapeItems = uniqueTickers.map((t) => ({ ticker: t, pct: itemsByTicker[t] }));
  if (lastEntry) tapeItems.push({ ticker: "USD/BRL", pct: lastEntry.fxPct });
  const doubled = [...tapeItems, ...tapeItems];
  const itemsHtml = doubled
    .map((it) => {
      // Precio: primero lo que vino del último fetch (tiene prevClose), sino el cache de quotes
      const pd = priceByTicker[it.ticker];
      const price = pd?.price ?? quotes[it.ticker] ?? null;
      const priceHtml = (it.ticker !== "USD/BRL" && price)
        ? `<span class="tape-price">$${price.toFixed(2)}</span>`
        : "";
      return `<span class="tape-item">${avatarHtml(it.ticker, logos[it.ticker], 18)}<b>${escapeHtml(it.ticker)}</b>${priceHtml}${
        typeof it.pct === "number" ? `<span class="${it.pct >= 0 ? "up" : "down"}">${fmtPct(it.pct)}</span>` : `<span class="muted">—</span>`
      }</span>`;
    })
    .join("");
  return `<div class="tape"><div class="tape-track">${itemsHtml}</div></div>`;
}

async function fetchLiveDayChange(opts = {}) {
  const h = state.hoje;
  // Solo se guarda/sobrescribe el historial cuando lo dispara el proceso automático de las
  // 20:00 (opts.autoSave) o cuando el usuario activó el checkbox "Guardar automáticamente".
  // Tocar el botón "Actualizar variación" a mano SOLO refresca lo que se ve en pantalla — no
  // toca el historial, aunque hoy ya tuviera un registro guardado.
  const autoSave = !!opts.autoSave;
  const finnhubKey = (state.posicoes.finnhubKey || "").trim();
  const twelveKey = (state.posicoes.apiKey || "").trim();
  if (!finnhubKey && !twelveKey) {
    h.error = "Configura tu clave de Finnhub (precios) o de Twelve Data (cambio) en la pestaña Posiciones primero.";
    render();
    return;
  }
  h.fetchStatus = "loading";
  h.error = null;
  h.fetchProgressLabel = "Buscando…";
  render();

  const tickers = [...new Set(state.portfolio.map((p) => p.ticker).filter(Boolean))];
  const errors = [];
  const pctByTicker = {};   // { SYM: { pct, price, prevClose } }
  let fxPct = null;

  // Stocks via Finnhub — 60 calls/min on the free plan, so every ticker fetches at once.
  const stocksPromise = (async () => {
    if (!finnhubKey) { if (tickers.length) errors.push("Sin clave de Finnhub: no se buscó la variación de las acciones."); return; }
    await Promise.all(
      tickers.map(async (sym) => {
        try {
          const url = `https://finnhub.io/api/v1/quote?symbol=${encodeURIComponent(sym)}&token=${encodeURIComponent(finnhubKey)}`;
          const resp = await fetch(url);
          const data = await resp.json();
          const pct = Number(data?.dp);
          const price = Number(data?.c);
          const prevClose = Number(data?.pc);
          if (!Number.isFinite(pct) || (price === 0 && prevClose === 0)) {
            errors.push(`Sin variación para ${sym}.`);
            return;
          }
          pctByTicker[sym] = { pct, price, prevClose };
        } catch (err) {
          errors.push(`No pude buscar ${sym} en Finnhub (sin conexión).`);
        }
      })
    );
  })();

  // USD/BRL via Twelve Data — just 1 symbol, far under its free per-minute limit.
  const fxPromise = (async () => {
    if (!twelveKey) { errors.push("Sin clave de Twelve Data: no se buscó la variación del cambio."); return; }
    try {
      const url = `https://api.twelvedata.com/quote?symbol=USD/BRL&apikey=${encodeURIComponent(twelveKey)}`;
      const resp = await fetch(url);
      const data = await resp.json();
      if (data && data.status === "error") { errors.push(data.message || "Error al buscar la variación del cambio en Twelve Data."); return; }
      const pct = parseFloat(data?.percent_change);
      if (Number.isFinite(pct)) fxPct = pct;
      else errors.push("Sin variación para USD/BRL.");
    } catch (err) {
      errors.push("No pude buscar la variación del cambio en Twelve Data (sin conexión).");
    }
  })();

  await Promise.all([stocksPromise, fxPromise]);
  h.fetchProgressLabel = null;

  if (isMarketClosedToday()) {
    errors.unshift(`Hoy ${marketClosedReason()}: el mercado de EE. UU. está cerrado. Estos valores son del último cierre disponible, no de hoy.`);
  }

  const map = {};
  state.portfolio.forEach((p) => {
    const v = pctByTicker[p.ticker];
    map[p.id] = typeof v === "object" ? String(v.pct) : "0";
  });
  h.reviewMap = map;
  // También guardamos el precio actual y el cierre anterior por ticker para mostrarlo en la tabla
  h.priceByTicker = {};
  Object.entries(pctByTicker).forEach(([sym, d]) => { h.priceByTicker[sym] = d; });
  // Actualizamos el precio en posicoes.rows también (igual que hace fetchQuotes), así el
  // banner del header y la tabla de posiciones quedan sincronizados con el precio en vivo.
  if (state.posicoes) {
    const newQuotes = { ...state.posicoes.quotes };
    Object.entries(pctByTicker).forEach(([sym, d]) => { if (d.price) newQuotes[sym] = d.price; });
    state.posicoes.quotes = newQuotes;
    state.posicoes.rows = state.posicoes.rows.map((r) => {
      const q = pctByTicker[r.ticker];
      return q && q.price ? { ...r, price: q.price } : r;
    });
    state.posicoes.quotesUpdatedAt = new Date().toISOString();
    persistQuotesCache();
  }
  h.fxPctInput = fxPct !== null ? String(fxPct) : "0";
  h.error = errors.length ? errors.join(" ") : null;
  h.fetchStatus = "idle";

  // Notificación push si algún activo varía más del 3% (en cualquier dirección)
  const bigMovers = Object.entries(pctByTicker)
    .filter(([, d]) => Math.abs(d.pct) >= 3)
    .sort((a, b) => Math.abs(b[1].pct) - Math.abs(a[1].pct));
  if (bigMovers.length) {
    const lines = bigMovers.map(([sym, d]) => `${sym} ${d.pct >= 0 ? "+" : ""}${d.pct.toFixed(2)}%`).join(" · ");
    sendPushNotification("⚠️ Movimiento fuerte en tu cartera", lines, "pnl-alert");
  }
  // Al buscar automáticamente ya se muestra el resultado calculado por activo de inmediato
  // (sin un paso intermedio de revisión manual) — sigue pudiéndose ajustar con el lápiz "Editar valores".
  // Tocar el botón a mano NUNCA guarda en el historial: solo el proceso automático (autoSave) lo hace.
  compute();
  if (autoSave && !h.error) {
    saveHistoryAction();
  }
}

function parsePasted() {
  const text = state.hoje.pasteText;
  const regex = /([A-Za-zÀ-ÿ\/]{2,12})\s*[:=]\s*([+-]?\d+(?:[.,]\d+)?)\s*%?/g;
  const found = {};
  let m;
  while ((m = regex.exec(text)) !== null) found[m[1].toUpperCase()] = parseNum(m[2]);
  if (!Object.keys(found).length) {
    state.hoje.error = "No pude reconocer ningún valor en ese texto. Revisa el formato e intenta de nuevo.";
    render();
    return;
  }
  const map = {};
  state.portfolio.forEach((p) => {
    const v = found[p.ticker.toUpperCase()];
    map[p.id] = typeof v === "number" ? String(v) : "0";
  });
  state.hoje.reviewMap = map;
  const fx = found["USDBRL"] ?? found["USD/BRL"] ?? found["USD"];
  state.hoje.fxPctInput = typeof fx === "number" ? String(fx) : "0";
  state.hoje.error = null;
  // Pegar datos también muestra el resultado calculado de inmediato (vista previa) — nunca
  // se guarda en el historial desde aquí; eso solo lo hace el proceso automático de las 20:00.
  compute();
}

function compute() {
  const h = state.hoje;
  const rows = state.portfolio.map((p) => {
    const pct = parseNum(h.reviewMap[p.id]);
    const saldo = parseNum(p.saldo);
    return { id: p.id, ticker: p.ticker, broker: p.broker, saldo, changePct: pct, gain: (saldo * pct) / 100 };
  });
  const priceTotal = rows.reduce((s, r) => s + r.gain, 0);
  const fxPct = parseNum(h.fxPctInput);
  const totalSaldo = state.portfolio.reduce((s, p) => s + parseNum(p.saldo), 0);
  const fxGain = (totalSaldo * fxPct) / 100;
  h.result = { rows, priceTotal, fxPct, fxGain, total: priceTotal + fxGain };
  h.status = "result";
  render();
}

function saveHistoryAction() {
  const h = state.hoje;
  if (!h.result) return;
  const nowIso = new Date().toISOString();
  const entry = {
    id: uid(),
    date: nowIso,
    rows: h.result.rows,
    fxPct: h.result.fxPct,
    fxGain: h.result.fxGain,
    priceTotal: h.result.priceTotal,
    total: h.result.total,
  };

  // Si ya existe un registro de hoy (hora de Brasil) — por ejemplo el guardado automático
  // de las 20:00 — se reemplaza en vez de crear un duplicado. Así, tocar de nuevo el botón
  // "Buscar variación automáticamente"/"Actualizar variación" el mismo día actualiza el
  // registro existente en lugar de acumular varias entradas para el mismo día.
  const todayBZ = brazilTodayYMD();
  const existingIdx = state.history.findIndex((e) => dateToBrazilYMD(e.date) === todayBZ);
  if (existingIdx !== -1) {
    entry.id = state.history[existingIdx].id;
    state.history = [...state.history.slice(0, existingIdx), entry, ...state.history.slice(existingIdx + 1)];
  } else {
    state.history = [...state.history, entry];
  }
  persistHistory();

  // Notificación push: avisa en todos los dispositivos que el historial se guardó
  const totalStr = entry.total >= 0 ? `+${fmtBRL(entry.total)}` : fmtBRL(entry.total);
  sendPushNotification(
    "P&L Diario — Historial guardado",
    `Resultado del día: ${totalStr} (precios ${fmtBRL(entry.priceTotal)}, cambio ${fmtBRL(entry.fxGain)})`,
    "pnl-autosave"
  );

  h.status = "saved";
  h.savedAt = nowIso;
  render();
}

function rowEffectiveValue(r) {
  const computed = rowComputedValue(r);
  return computed !== null ? computed : parseNum(r.saldo) || 0;
}

function rowEffectiveValueUsd(r) {
  const price = parseNum(r.price);
  const qty = parseNum(r.quantity);
  if (price) return qty * price;
  const fx = parseNum(state.posicoes?.fxRateInput);
  const saldo = parseNum(r.saldo) || 0;
  return fx ? saldo / fx : 0;
}

function updateRowValueCell(id) {
  const row = state.posicoes.rows.find((r) => r.id === id);
  const cell = document.getElementById(`value-cell-${id}`);
  if (!row || !cell) return;
  const computed = rowComputedValue(row);
  cell.innerHTML =
    computed !== null
      ? `<span class="computed-value" id="value-${id}">${fmtBRL(computed)}</span>`
      : `<input class="input-cell" inputmode="decimal" data-bind="saldo" data-id="${id}" value="${escapeAttr(row.saldo)}">`;
}

function updateLiveTotal() {
  const liveTotal = state.posicoes.rows.reduce((s, r) => s + rowEffectiveValue(r), 0);
  const span = document.getElementById("live-total");
  if (span) span.textContent = fmtBRL(liveTotal);
  const headerSpan = document.getElementById("header-total-value");
  if (headerSpan) headerSpan.textContent = fmtBRL(liveTotal);
}

// MEJORA #2 — Dividendos. Viven como transacciones tipo "dividend" dentro de
// state.transactions (igual que buy/sell), con qty = acciones que cobraron el dividendo y
// price = monto BRUTO por acción en US$ (antes de la retención de EE. UU.). El neto se calcula
// siempre al mostrarlo, con la tasa de retención configurable abajo (30% por defecto, la
// retención estándar para no residentes sin tratado fiscal) — así si algún broker retuvo un
// % distinto, alcanza con ajustar la tasa en vez de editar cada dividendo.
function renderDividendsCard() {
  const p = state.posicoes;
  const dividends = state.transactions.filter((t) => t.type === "dividend").slice().sort((a, b) => new Date(b.date) - new Date(a.date));
  const taxPct = parseNum(p.dividendTaxPct) || 0;
  const COLLAPSED_COUNT = 6;
  const visibleDividends = p.dividendsExpanded ? dividends : dividends.slice(0, COLLAPSED_COUNT);

  let totalGrossUsd = 0, totalNetUsd = 0, totalNetBrlKnown = 0, anyFx = false;
  // Los totales SIEMPRE se calculan sobre TODOS los dividendos (no solo los visibles) — la
  // lista se puede acortar para que no ocupe toda la pantalla, pero la suma de arriba nunca
  // debe cambiar según esté expandida o no.
  dividends.forEach((t) => {
    const gross = t.qty * t.price;
    const net = gross * (1 - taxPct / 100);
    totalGrossUsd += gross;
    totalNetUsd += net;
    const hasFx = typeof t.fx === "number" && t.fx > 0;
    if (hasFx) { totalNetBrlKnown += net * t.fx; anyFx = true; }
  });
  const rowsHtml = visibleDividends
    .map((t) => {
      const gross = t.qty * t.price;
      const net = gross * (1 - taxPct / 100);
      const hasFx = typeof t.fx === "number" && t.fx > 0;
      return `<tr>
        <td><div class="ticker-cell">${avatarHtml(t.ticker, state.posicoes?.logos?.[t.ticker], 20)}<b>${escapeHtml(t.ticker)}</b></div></td>
        <td class="small">${fmtShortDate(t.date)}</td>
        <td class="num small">US$ ${net.toFixed(2)}${hasFx ? ` <span class="muted">(R$ ${(net * t.fx).toFixed(2)})</span>` : ""}</td>
      </tr>`;
    })
    .join("");

  const missingHtml = p.missingDividends.length
    ? `<div class="banner banner-warn">${icon("alert-triangle", 15)}
        <div>Encontré ${p.missingDividends.length} dividendo(s) pagados que no tienes registrados:
          <ul class="error-list">
            ${p.missingDividends
              .map(
                (m) =>
                  `<li>${escapeHtml(m.ticker)} · ${fmtShortDate(m.date)} · US$ ${m.perShare.toFixed(4)}/acción
                    <button class="btn btn-ghost btn-sm" style="padding:2px 8px;margin-left:6px" data-action="quickadd-dividend" data-ticker="${escapeAttr(m.ticker)}" data-date="${escapeAttr(m.date.slice(0, 10))}" data-price="${m.perShare}">+ Agregar</button>
                  </li>`
              )
              .join("")}
          </ul>
        </div>
      </div>`
    : "";

  return `<div class="card">
    <div class="card-title-row">
